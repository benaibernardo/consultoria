        document.getElementById('modal-lib').style.display = 'flex';
        
        const grpSel = document.getElementById('lib-group'); grpSel.innerHTML = '';
        const eqSel = document.getElementById('lib-equip'); eqSel.innerHTML = '';
        const metSel = document.getElementById('lib-method'); metSel.innerHTML = '';
        
        appData.groups.forEach(g => grpSel.add(new Option(g, g)));
        appData.equips.forEach(e => eqSel.add(new Option(e, e)));
        appData.methods.forEach(m => metSel.add(new Option(m, m)));

        if (idx !== null) {
            const ex = appData.library[idx];
            document.getElementById('lib-id').value = idx;
            document.getElementById('lib-name').value = ex.name;
            document.getElementById('lib-group').value = ex.group;
            document.getElementById('lib-equip').value = ex.equip;
            document.getElementById('lib-method').value = ex.method || 'Musculação';
            document.getElementById('lib-video').value = ex.video || '';
        } else {
            document.getElementById('lib-id').value = 'NEW';
            document.getElementById('lib-name').value = '';
            // Set defaults if available
            if(appData.methods.length) document.getElementById('lib-method').value = appData.methods[0];
            document.getElementById('lib-video').value = '';
        }
    }

    function saveLibItem() {
        const id = document.getElementById('lib-id').value;
        const item = { 
            name: document.getElementById('lib-name').value, 
            group: document.getElementById('lib-group').value, 
            equip: document.getElementById('lib-equip').value, 
            method: document.getElementById('lib-method').value,
            video: document.getElementById('lib-video').value 
        };
        
        if(!item.name) return alert("Nome obrigatório");
        
        if(id === 'NEW') appData.library.push(item); 
        else appData.library[id] = item;
        
        saveLocal(); closeModal('modal-lib'); renderLibrary();
    }

    // --- CAT MANAGER ---
    function openCatManager(type) {
        editingCatType = type;
        document.getElementById('modal-cat').style.display = 'flex';
        
        let title = 'Categorias';
        if(type === 'groups') title = 'Grupos Musculares';
        else if(type === 'equips') title = 'Equipamentos';
        else if(type === 'methods') title = 'Métodos de Treino';
        
        document.getElementById('cat-modal-title').innerText = title;
        renderCatList();
    }
    function renderCatList() {
        const list = document.getElementById('cat-list'); list.innerHTML = '';
        const dataArr = appData[editingCatType];
        
        if(dataArr) {
            dataArr.forEach((tag, i) => {
                list.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--border); background:var(--bg); border-radius:8px;">
                    <span style="font-weight:700; color:var(--text);">${tag}</span> 
                    <div style="display:flex; gap:8px;">
                        <i class="fa-solid fa-pencil" style="cursor:pointer; color:var(--accent); font-size:0.9rem;" onclick="editCategory(${i})" title="Editar"></i>
                        <i class="fa-solid fa-trash" style="cursor:pointer; color:var(--danger); font-size:0.9rem;" onclick="delCategory('${editingCatType}', ${i})" title="Excluir"></i>
                    </div>
                </div>`;
            });
        }
    }
    function addCategory() {
        const name = document.getElementById('new-cat-name').value.trim();
        if(name && !appData[editingCatType].includes(name)) { 
            appData[editingCatType].push(name); 
            saveLocal(); 
            renderCatList(); 
            document.getElementById('new-cat-name').value = ''; 
            
            // Refresh underlying selects (modal & filter) immediately if open
            refreshSelects(editingCatType);
        }
    }
    
    function refreshSelects(type) {
        // Helper to refresh Dropdowns without closing modal
        if (document.querySelector('.rp-tab.active').id === 'rt-lib') {
            const filterMap = {'groups': 'filter-group', 'equips': 'filter-equip', 'methods': 'filter-method'};
            const libMap = {'groups': 'lib-group', 'equips': 'lib-equip', 'methods': 'lib-method'};
            
            const populate = (id, arr, def) => {
                const sel = document.getElementById(id);
                if(!sel) return;
                const oldVal = sel.value;
                sel.innerHTML = '';
                if(def) sel.add(new Option(def, ''));
                arr.forEach(item => sel.add(new Option(item, item)));
                sel.value = oldVal;
            };

            populate(filterMap[type], appData[type], type === 'groups' ? 'Grupo: Todos' : (type === 'equips' ? 'Equip: Todos' : 'Método: Todos'));
            populate(libMap[type], appData[type], null);
        }
    }

    function editCategory(idx) {
        const oldVal = appData[editingCatType][idx];
        const newVal = prompt("Editar nome:", oldVal);
        if(newVal && newVal.trim() !== "" && newVal !== oldVal) {
            appData[editingCatType][idx] = newVal.trim();
            saveLocal();
            renderCatList();
            refreshSelects(editingCatType);
        }
    }
    function delCategory(type, idx) { 
        if(confirm("Remover esta opção da lista?")) { 
            appData[type].splice(idx, 1); 
            saveLocal(); 
            renderCatList(); 
            refreshSelects(type);
        } 
    }

    // --- CLOUD & UTILS ---
    async function saveToCloud(method) {
        const t = document.getElementById('gh-token').value;
        if(!t) return alert("Configure o Token primeiro.");
        if(method === 'POST' || !currentStudent.gistId) { if(!confirm("Criar novo link?")) return; method = 'POST'; }
        try {
            const payload = { description: `Treino: ${currentStudent.name}`, public: false, files: { "treino.json": { content: JSON.stringify(currentStudent) } } };
            let url = 'https://api.github.com/gists'; 
            if(method === 'PATCH') url += '/'+currentStudent.gistId;
            const res = await fetch(url, { method, headers:{'Authorization':`token ${t}`}, body:JSON.stringify(payload)});
            if(!res.ok) throw new Error("Erro na nuvem");
            const j = await res.json();
            if(method === 'POST') { currentStudent.gistId = j.id; saveLocal(); }
            copyTinyUrlFlow(j.id);
        } catch(e){ alert("Erro: " + e.message); }
    }

    function copyTinyUrlFlow(gistId) {
        const id = gistId || currentStudent.gistId;
        if(!id) return alert("Salve na nuvem primeiro.");
        const longUrl = `${window.location.origin}${window.location.pathname.replace('gerador.html','webapp.html')}?id=${id}`;
        navigator.clipboard.writeText(longUrl).then(() => {
            if(confirm("Link original copiado!\n\nAbrir TinyURL?")) window.open("https://tinyurl.com/app", "_blank");
        });
    }

    function generateOffline() {
        const c = LZString.compressToEncodedURIComponent(JSON.stringify(currentStudent));
        const url = `${window.location.origin}${window.location.pathname.replace('gerador.html','webapp.html')}?data=${c}`;
        navigator.clipboard.writeText(url).then(() => showToast("Link Offline Copiado!"));
    }

    function previewWorkout() {
        localStorage.setItem('preview_workout', JSON.stringify(currentStudent));
        window.open('webapp.html?preview=true', '_blank');
    }

    function promptImportID() {
        const id = prompt("Insira o Gist ID do aluno:");
        if(id && document.getElementById('gh-token').value) {
            fetch(`https://api.github.com/gists/${id}`, { headers:{'Authorization':`token ${document.getElementById('gh-token').value}`} })
            .then(r => r.json())
            .then(j => {
                const s = JSON.parse(j.files["treino.json"].content);
                s.gistId = id;
                appData.students.unshift(s);
                saveLocal(); renderStudentList(); loadStudent(s.id);
                showToast("Aluno Importado!");
                closeModal('modal-cloud');
            })
            .catch(e => alert("Erro ao importar: " + e.message));
        } else { alert("Token necessário"); }
    }

    // --- DELETE STUDENT ---
    function deleteCurrentStudent() {
        if(!currentStudent) return;
        if(confirm(`Tem certeza que deseja excluir o aluno "${currentStudent.name}"?\nEsta ação não pode ser desfeita.`)) {
            appData.students = appData.students.filter(s => s.id !== currentStudent.id);
            saveLocal();
            currentStudent = null;
            renderStudentList();
            if(appData.students.length > 0) {
                loadStudent(appData.students[0].id);
            } else {
                createStudent();
            }
            showToast("Aluno Excluído!");
        }
    }

    // --- UTILS ---
    function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(appData)); }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function openCloudModal() { document.getElementById('modal-cloud').style.display='flex'; }
    function saveToken() { localStorage.setItem(TOKEN_KEY, document.getElementById('gh-token').value); showToast("Token Salvo"); }
    function backupJSON() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(appData)],{type:'application/json'})); a.download='benai_manager_backup.json'; a.click(); }
    function restoreJSON(inp) { const r=new FileReader(); r.onload=e=>{ try{ appData=JSON.parse(e.target.result); saveLocal(); location.reload(); }catch(e){alert("Erro arquivo");} }; r.readAsText(inp.files[0]); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function switchView(v) { 
        document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active')); 
        const trainCanvas = document.getElementById('editor-canvas');
        const methodCanvas = document.getElementById('method-canvas');
        
        if(v === 'train') {
            document.getElementById('tab-train').classList.add('active');
            trainCanvas.style.display = 'block';
            methodCanvas.style.display = 'none';
        } else if (v === 'logic') {
            document.getElementById('tab-logic').classList.add('active');
            trainCanvas.style.display = 'none';
            methodCanvas.style.display = 'block';
            renderPhoneMethodology();
            switchRightTab('method');
        }
    }
    function toggleTheme() { const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark'); }

</script>
</body>
