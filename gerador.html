
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benai Manager | Studio CRM</title>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            alert('Error: ' + msg + '\nLine: ' + lineNo + '\nColumn: ' + columnNo);
            return false;
        };
    </script>
    
    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #001F5B; --accent: #00A8E8; --bg: #f8fafc;
            --surface: #ffffff; --text: #1e293b; --text-muted: #64748b;
            --border: #cbd5e1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --purple: #8b5cf6; --pink: #ec4899;
            
            --mgr-bg: #e2e8f0; --mgr-sidebar: #ffffff;
            --hover-item: #e0f2fe;
            
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        [data-theme="dark"] {
            --primary: #bae6fd; --accent: #38bdf8; --bg: #0f172a;
            --surface: #1e293b; --text: #f1f5f9; --text-muted: #94a3b8;
            --border: #334155; --mgr-bg: #020617; --mgr-sidebar: #0f172a;
            --success: #34d399; --warning: #fbbf24; --danger: #f87171;
            --hover-item: #1e3a8a;
        }

        * { box-sizing: border-box; outline: none; font-family: var(--font-body); }
        body { margin: 0; height: 100vh; display: flex; overflow: hidden; background: var(--mgr-bg); color: var(--text); font-size: 13px; transition: background 0.3s, color 0.3s; }
        
        /* --- LAYOUT GRID --- */
        #main-layout { 
            display: grid; 
            grid-template-columns: 340px 1fr 320px; 
            width: 100%; height: 100%; 
        }

        /* --- COL 1: CRM SIDEBAR --- */
        .sidebar { background: var(--mgr-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 20; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        
        .sb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-family: var(--font-head); font-weight: 800; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        .btn-icon-sm { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-icon-sm:hover { color: var(--accent); border-color: var(--accent); background: var(--bg); }

        .btn-primary-block { background: var(--primary); color: var(--bg); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-primary-block:hover { opacity: 0.9; transform: translateY(-1px); }
        [data-theme="dark"] .btn-primary-block { color: #0f172a; }

        .btn-demo-block { background: var(--purple); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 0.85rem; }
        .btn-demo-block:hover { background: #7c3aed; transform: translateY(-1px); }

        .search-box { position: relative; margin-bottom: 10px; margin-top: 5px; }
        .search-inp { width: 100%; padding: 10px 10px 10px 35px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 0.85rem; color: var(--text); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .student-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
        
        .s-item { 
            padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; 
            border: 1px solid var(--border); background: var(--surface); position: relative; 
            display: flex; flex-direction: column; gap: 4px;
        }
        .s-item:hover { 
            border-color: var(--accent); 
            transform: translateX(6px); 
            background: var(--hover-item);
            box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
        }
        .s-item.active { border-color: var(--primary); background: var(--bg); box-shadow: inset 4px 0 0 var(--primary); }

        .s-header { display: flex; justify-content: space-between; align-items: center; }
        .s-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
        .s-days { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--bg); }
        
        .progress-track { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 2px; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        
        .s-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        .checkup-badge { display: flex; align-items: center; gap: 4px; color: var(--purple); font-weight: 700; background: rgba(139, 92, 246, 0.1); padding: 2px 6px; border-radius: 4px; }

        /* --- COL 2: EDITOR WORKSPACE --- */
        .workspace { 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px; overflow-y: auto; background: var(--mgr-bg); position: relative; gap: 20px;
        }
        
        .phone-frame {
            width: 520px; min-height: 850px; background: var(--bg);
            border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            border: 8px solid #1e293b; overflow: hidden; display: flex; flex-direction: column;
            position: relative; flex-shrink: 0;
            transition: all 0.3s ease-in-out;
        }

        .preview-actions {
            width: 220px;
            display: flex; flex-direction: column; gap: 10px;
            position: sticky; top: 20px; flex-shrink: 0;
        }
        
        .pa-btn-wide {
            width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 800;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 10px;
            transition: 0.2s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .pa-btn-wide:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pa-tiny { background: #3b82f6; }
        .pa-update { background: #10b981; }
        .pa-link { background: #8b5cf6; }

        .builder-controls {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 15px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .builder-header { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .b-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .b-btn { 
            padding: 8px 10px; border-radius: 8px; border: 1px solid transparent; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; justify-content: flex-start;
        }
        .b-btn:hover { transform: translateY(-1px); }
        .bb-block { background: var(--primary); color: white; margin-bottom: 5px; justify-content: center; }
        .bb-iso { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .bb-bi { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .bb-tri { background: #f3e8ff; color: #8b5cf6; border-color: #ddd6fe; }
        .bb-drop { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
        .bb-rest { background: #fff7ed; color: #f97316; border-color: #fed7aa; }
        .bb-static { background: #ecfeff; color: #06b6d4; border-color: #a5f3fc; }
        .bb-pyr { background: #eef2ff; color: #6366f1; border-color: #c7d2fe; }
        .bb-gvt { background: #ecfdf5; color: #10b981; border-color: #a7f3d0; }
        .bb-fst { background: #fce7f3; color: #db2777; border-color: #fbcfe8; }
        [data-theme="dark"] .b-btn:not(.bb-block) { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }

        .app-header { background: #001F5B; padding: 30px 20px 20px 20px; color: white; border-radius: 0 0 30px 30px; box-shadow: 0 10px 25px rgba(0, 31, 91, 0.25); display: flex; flex-direction: column; gap: 15px; }
        
        .brand-header { text-align: center; }
        .brand-title { font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; }
        .brand-sub { font-size: 0.6rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; font-weight: 600; color: white; }

        .student-header { text-align: center; margin-bottom: 5px; }
        .greeting-wrapper { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 2px; }
        .greeting-text { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; color: white; }
        .inp-name-edit { background: transparent; border: none; border-bottom: 2px solid transparent; color: white; font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; width: auto; min-width: 50px; text-align: left; outline: none; transition: 0.2s; padding: 0; }
        .inp-name-edit:focus { border-bottom-color: var(--accent); }
        .inp-focus-edit { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: var(--accent); width: 100%; border-radius: 8px; padding: 4px 8px; font-size: 0.75rem; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px; outline: none; }
        .inp-focus-edit:focus { background: rgba(255,255,255,0.2); border-color: var(--accent); }

        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .header-box { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 12px; transition: 0.2s; display: flex; flex-direction: column; justify-content: center; }
        .header-box:hover, .header-box:focus-within { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        
        .hb-label { font-size: 0.6rem; text-transform: uppercase; color: rgba(255,255,255,0.6); font-weight: 700; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
        .hb-input { background: transparent; border: none; color: white; width: 100%; font-family: var(--font-body); font-weight: 700; font-size: 0.8rem; cursor: pointer; outline: none; }
        
        .checkup-box { grid-column: span 2; background: rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.3); }
        .checkup-box:hover, .checkup-box:focus-within { background: rgba(139, 92, 246, 0.25); border-color: rgba(139, 92, 246, 0.5); }
        .checkup-label { color: #e9d5ff; }
        .checkup-controls { display: flex; gap: 8px; align-items: center; }
        .chk-select { background: transparent; border: none; color: white; font-weight: 700; font-size: 0.8rem; cursor: pointer; outline: none; flex: 1; }
        .chk-select option { background: var(--primary); color: white; }
        .chk-date-display { font-size: 0.7rem; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; color: #ddd6fe; font-weight: 600; white-space: nowrap; }

        .fade-enter { animation: fadeIn 0.3s ease-out forwards; }
        .fade-exit { animation: fadeOut 0.2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-5px); } }

        .app-tabs { display: flex; justify-content: center; gap: 15px; margin: 15px 0; padding: 0 15px; }
        .app-tab { width: 50px; height: 50px; border-radius: 16px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; border: 1px solid var(--border); transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .app-tab.active { background: var(--primary); color: white; transform: translateY(-3px); border-color: var(--primary); }

        .editor-content { flex: 1; overflow-y: auto; padding: 0 15px 100px 15px; scroll-behavior: smooth; }

        /* --- BLOCKS & EXERCISES --- */
        .blk-wrapper { 
            margin-bottom: 20px; border: 2px solid transparent; border-radius: 16px; 
            background: var(--surface); overflow: hidden; transition: 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .blk-wrapper.locked { border-color: var(--warning); opacity: 0.9; }
        
        .blk-head { 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #f8fafc; border-bottom: 1px solid var(--border);
        }
        [data-theme="dark"] .blk-head { background: #1e293b; }
        
        .blk-handle { cursor: grab; padding: 5px; color: var(--text-muted); }
        .blk-handle:active { cursor: grabbing; color: var(--primary); }

        .blk-title-grp { flex: 1; margin-right: 10px; margin-left: 5px; }
        .inp-blk-title { font-family: var(--font-head); font-weight: 800; font-size: 1rem; color: var(--primary); background: transparent; border: none; width: 100%; display: block; }
        .inp-blk-sub { font-size: 0.75rem; color: var(--text-muted); background: transparent; border: none; width: 100%; font-style: italic; display: block; margin-top: 2px; }
        
        .blk-tools { display: flex; gap: 6px; }
        .bt-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); font-size: 0.8rem; transition: 0.2s; }
        .bt-icon:hover { color: var(--accent); border-color: var(--accent); }
        .bt-icon.min.active { background: var(--accent); color: white; border-color: var(--accent); }
        .bt-icon.lock.locked { background: var(--warning); color: white; border-color: var(--warning); }
        
        .blk-body { 
            padding: 10px; min-height: 50px; 
            transition: all 0.4s ease-in-out; 
            overflow: hidden; max-height: 5000px; opacity: 1; 
        }
        .blk-body.collapsed { 
            max-height: 0; opacity: 0; padding: 0 10px; border: none; 
        }
        
        /* EXERCISE CARD */
        .ex-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 10px; margin-bottom: 10px; position: relative;
            border-left: 4px solid var(--border); transition: 0.2s;
            animation: fadeIn 0.3s ease-out;
        }
        .ex-card:hover { transform: translateX(2px); border-color: var(--accent); }

        .ex-drag-handle {
            position: absolute; left: 0; top: 0; bottom: 0; width: 15px;
            cursor: grab; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); opacity: 0; transition: 0.2s;
            background: rgba(0,0,0,0.02);
        }
        .ex-card:hover .ex-drag-handle { opacity: 0.5; }
        .ex-drag-handle:hover { opacity: 1; background: rgba(0,0,0,0.05); }
        .ex-drag-handle i { font-size: 0.7rem; }

        /* Method Colors */
        .m-Normal { border-left-color: #cbd5e1; }
        .m-Bi-set { border-left-color: #3b82f6; background: #eff6ff; }
        .m-Tri-set { border-left-color: #8b5cf6; background: #f3e8ff; }
        .m-Drop-set { border-left-color: #ef4444; background: #fef2f2; }
        .m-Rest-Pause { border-left-color: #f97316; background: #fff7ed; }
        .m-Isometria { border-left-color: #06b6d4; background: #ecfeff; }
        .m-Pirâmide { border-left-color: #6366f1; background: #eef2ff; }
        .m-GVT { border-left-color: #10b981; background: #ecfdf5; }
        .m-FST-7 { border-left-color: #db2777; background: #fce7f3; }
        
        [data-theme="dark"] .m-Bi-set { background: rgba(59,130,246,0.1); }
        [data-theme="dark"] .m-Tri-set { background: rgba(139,92,246,0.1); }
        [data-theme="dark"] .m-Drop-set { background: rgba(239,68,68,0.1); }
        [data-theme="dark"] .m-Rest-Pause { background: rgba(249,115,22,0.1); }
        [data-theme="dark"] .m-Isometria { background: rgba(6,182,212,0.1); }
        [data-theme="dark"] .m-Pirâmide { background: rgba(99,102,241,0.1); }
        [data-theme="dark"] .m-GVT { background: rgba(16,185,129,0.1); }
        [data-theme="dark"] .m-FST-7 { background: rgba(219,39,119,0.1); }

        .ex-content-wrap { margin-left: 15px; }

        .ex-top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
        .ex-title { font-weight: 800; color: var(--text); font-size: 0.95rem; font-family: var(--font-head); width: 100%; border: none; background: transparent; padding: 0; display:flex; align-items:center; gap:5px; }
        
        .method-badge {
            font-size: 0.55rem; font-weight: 800; padding: 2px 6px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: white; white-space: nowrap; cursor: default;
        }
        
        .ex-submenu { display: flex; gap: 4px; }
        .sm-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .sm-btn:hover { background: var(--bg); color: var(--accent); }
        .sm-btn.del:hover { color: var(--danger); }

        .ex-grid { display: grid; grid-template-columns: 0.8fr 1fr 0.8fr 0.8fr; gap: 4px; margin-bottom: 6px; }
        .stat-input-grp { display: flex; flex-direction: column; gap: 2px; }
        .stat-lbl { font-size: 0.55rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-left: 2px; }
        .stat-inp { 
            background: var(--bg); border: 1px solid var(--border); border-radius: 6px; 
            padding: 4px 6px; text-align: center; font-weight: 700; color: var(--primary); 
            font-size: 0.85rem; width: 100%; font-family: var(--font-head);
        }
        .stat-inp:focus { border-color: var(--accent); background: white; }

        .extra-field-Row { margin-bottom: 6px; }
        .extra-inp { background: rgba(255,255,255,0.5); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; width: 100%; color: var(--text); font-weight: 600; }
        .ex-obs { width: 100%; background: #fefce8; border: 1px solid #fef08a; padding: 6px 8px; border-radius: 6px; font-size: 0.8rem; color: #854d0e; display: flex; gap: 5px; align-items: center; }
        [data-theme="dark"] .ex-obs { background: rgba(254, 240, 138, 0.1); border-color: rgba(254, 240, 138, 0.2); color: #fde047; }
        .ex-obs input { background: transparent; border: none; width: 100%; color: inherit; font-weight: 500; font-size: 0.75rem; }

        /* --- PREVIEW ACTIONS CONTAINER --- */
        .preview-actions { 
            display: flex; flex-direction: column; gap: 10px; 
            position: sticky; top: 20px; z-index: 30; 
            width: 260px; /* Fixed width for the side panel */
        }
        
        .pa-btn-wide { 
            width: 100%; padding: 12px; border-radius: 12px; border: none; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; justify-content: flex-start;
            font-size: 0.85rem; font-weight: 700; color: white; transition: 0.2s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 8px;
        }
        .pa-btn-wide:hover { transform: translateY(-2px); opacity: 0.95; }
        .pa-tiny { background: var(--success); } 
        .pa-update { background: var(--warning); }
        .pa-link { background: var(--purple); }
        .pa-pdf { background: var(--danger); }

        /* --- BUILDER MENU --- */
        .builder-controls {
            margin-top: 10px; padding-top: 15px; border-top: 2px dashed var(--border);
        }
        .builder-header { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        .b-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .b-btn {
            padding: 10px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .b-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .b-btn i { font-size: 0.9rem; }
        
        .bb-block { border-color: var(--primary); color: var(--primary); grid-column: span 2; justify-content: center; background: rgba(0,31,91,0.05); }
        .bb-iso { border-left: 3px solid #cbd5e1; }
        .bb-bi { border-left: 3px solid #3b82f6; }
        .bb-tri { border-left: 3px solid #8b5cf6; }
        .bb-drop { border-left: 3px solid #ef4444; }
        .bb-rest { border-left: 3px solid #f97316; }
        .bb-static { border-left: 3px solid #06b6d4; }
        .bb-pyr { border-left: 3px solid #6366f1; }
        .bb-gvt { border-left: 3px solid #10b981; }
        .bb-fst { border-left: 3px solid #db2777; }

        /* --- RIGHT PANEL (LIBRARY) --- */
        .right-panel { background: var(--mgr-sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        
        .rp-header { padding: 15px; border-bottom: 1px solid var(--border); background: var(--bg); }
        .rp-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .rp-tab { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); }
        .rp-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* NEW LIBRARY LIST */
        .lib-content { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .lib-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px; display: flex; flex-direction: column; gap: 6px;
            transition: 0.2s;
        }
        .lib-card:hover { border-color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .lc-head { display: flex; justify-content: space-between; align-items: flex-start; }
        .lc-title { font-weight: 800; font-size: 0.9rem; color: var(--text); flex: 1; }
        .lc-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        
        .lc-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; color: white; }
        .bg-grp { background: var(--primary); }
        .bg-eq { background: var(--warning); }
        .bg-met { background: var(--purple); }
        
        .lc-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
        .lc-btn { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 0.8rem; border: 1px solid var(--border); background: var(--bg); }
        .lc-btn-add { background: var(--success); color: white; border-color: var(--success); width: 100%; font-weight: 700; }
        .lc-btn-add:hover { background: #059669; }
        .lc-btn-edit { color: var(--accent); }
        .lc-btn-edit:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .lc-btn-del { color: var(--danger); }
        .lc-btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* FILTER ROW */
        .filter-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .filter-select { flex:1; padding: 6px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.75rem; background: var(--surface); color: var(--text); font-weight: 600; cursor: pointer; width:100%; }
        
        .filter-group-row { display:flex; gap:2px; align-items:center; }
        .filter-gear { color:var(--text-muted); font-size:0.8rem; cursor:pointer; padding:6px; border-radius:6px; transition:0.2s; }
        .filter-gear:hover { background:var(--bg); color:var(--primary); }

        /* --- CLOUD MODAL (GRID RESTORED) --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); padding: 25px; border-radius: 24px; width: 500px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); max-height: 90vh; overflow-y: auto; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        
        .cloud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .cloud-tile { 
            padding: 15px; border-radius: 16px; border: 2px solid transparent; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            text-align: center; font-weight: 700; font-size: 0.8rem; transition: 0.2s;
        }
        .tile-save { background: #f0f9ff; color: #0ea5e9; border-color: #bae6fd; }
        .tile-save:hover { background: #0ea5e9; color: white; }
        .tile-backup { background: #f0fdf4; color: #10b981; border-color: #86efac; }
        .tile-backup:hover { background: #10b981; color: white; }
        .tile-restore { background: #fff7ed; color: #f97316; border-color: #fdba74; }
        .tile-restore:hover { background: #f97316; color: white; }
        .tile-import { background: #f5f3ff; color: #8b5cf6; border-color: #ddd6fe; }
        .tile-import:hover { background: #8b5cf6; color: white; }

        /* --- LIB MODAL STYLES (NEW) --- */
        .lib-field-row { background: var(--bg); margin-bottom: 12px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .lib-field-row label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .input-wrapper { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; }
        .input-wrapper i { font-size: 0.9rem; opacity: 0.7; }
        .input-wrapper input, .input-wrapper select, .input-wrapper textarea { border: none; background: transparent; padding: 10px 0; width: 100%; font-weight: 600; font-size: 0.85rem; color: var(--text); outline: none; }

        /* --- METHODOLOGY STYLES (NEW) --- */
        .pillar-card { 
            background: var(--surface); border-radius: 12px; border-left: 4px solid; 
            padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); position: relative;
            padding-left: 25px; /* Add padding for handle */
        }
        
        /* New Dynamic Color Classes */
        .p-red { border-color: #ef4444; background: #fef2f2; }
        .p-cyan { border-color: #06b6d4; background: #ecfeff; }
        .p-purple { border-color: #a855f7; background: #f3e8ff; }
        .p-blue { border-color: #3b82f6; background: #eff6ff; }
        .p-green { border-color: #10b981; background: #ecfdf5; }
        .p-orange { border-color: #f97316; background: #fff7ed; }
        .p-pink { border-color: #ec4899; background: #fdf2f8; }
        
        .p-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .p-title { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: var(--text); display: flex; gap: 6px; align-items: center; }
        .p-text-area { width: 100%; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); border-radius: 8px; padding: 8px; font-size: 0.85rem; color: var(--text); resize: vertical; min-height: 50px; }
        .p-actions { display: flex; gap: 8px; margin-left: auto; }
        .p-btn-edit { cursor: pointer; color: var(--text-muted); transition: 0.2s; font-size: 0.8rem; }
        .p-btn-edit:hover { color: var(--accent); }
        .p-btn-del { cursor: pointer; color: var(--text-muted); transition: 0.2s; font-size: 0.8rem; }
        .p-btn-del:hover { color: var(--danger); }

        /* PILLAR DRAG HANDLE */
        .p-drag-handle {
            position: absolute; left: 0; top: 0; bottom: 0; width: 20px;
            cursor: grab; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); opacity: 0; transition: 0.2s;
            border-top-left-radius: 8px; border-bottom-left-radius: 8px;
        }
        .pillar-card:hover .p-drag-handle { opacity: 0.5; }
        .p-drag-handle:hover { opacity: 1; background: rgba(0,0,0,0.05); }

        /* PHONE PREVIEW SPECIFIC STYLES */
        .ph-method-container { padding: 20px 15px; }
        .ph-section-title { font-size: 0.9rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 5px; }
        
        .ph-pillar-card { background: var(--surface); border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .ph-pillar-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }
        .ph-pillar-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

        /* GRID SELECTORS FOR PILLAR MODAL */
        .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .icon-opt, .color-opt { 
            cursor: pointer; border-radius: 8px; border: 2px solid var(--border); 
            display: flex; align-items: center; justify-content: center; height: 36px; transition: 0.2s; 
        }
        .icon-opt:hover, .color-opt:hover { border-color: var(--accent); }
        .icon-opt.selected, .color-opt.selected { border-color: var(--primary); background: var(--bg); color: var(--primary); }
        
        .color-opt { height: 24px; border-radius: 50%; border: 2px solid transparent; }
        .color-opt.selected { transform: scale(1.2); border: 2px solid var(--text); }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s; z-index: 200; opacity: 0; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div id="main-layout">
    
    <!-- 1. SIDEBAR (CRM) -->
    <div class="sidebar">
        <div class="sb-header">
            <div class="brand"><i class="fa-solid fa-dumbbell"></i> Benai Manager</div>
            <div style="display:flex; gap:5px;">
                <div class="btn-icon-sm" onclick="openCloudModal()" title="Dados e Nuvem" style="background:var(--accent); color:white; border-color:var(--accent);"><i class="fa-solid fa-cloud"></i></div>
                <div class="btn-icon-sm" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></div>
            </div>
        </div>

        <button class="btn-primary-block" onclick="createStudent()"><i class="fa-solid fa-user-plus"></i> Novo Aluno</button>
        <button class="btn-demo-block" onclick="createFullDemo()"><i class="fa-solid fa-wand-magic-sparkles"></i> Aluno Modelo</button>
        
        <div class="search-box">
            <i class="fa-solid fa-search search-icon"></i>
            <input class="search-inp" placeholder="Buscar aluno..." onkeyup="renderStudentList(this.value)">
        </div>
        
        <div class="student-list" id="studentList"></div>
    </div>

    <!-- 2. CENTER (EDITOR + ACTIONS) -->
    <div class="workspace">
        <div class="phone-frame" id="phone-preview">
            <!-- HEADER -->
            <div class="app-header">
                <div class="brand-header">
                    <div class="brand-title">BENAI BERNARDO</div>
                    <div class="brand-sub">Consultoria de Treinamento</div>
                </div>
                
                <div class="student-header">
                    <div class="greeting-wrapper">
                        <span class="greeting-text">Olá, </span>
                        <input id="ed-name" class="inp-name-edit" value="Aluno" oninput="resizeNameInput(this); updateStudent('name', this.value);">
                    </div>
                    <input id="ed-focus" class="inp-focus-edit" placeholder="OBJETIVO" oninput="updateStudent('focus', this.value)">
                </div>
                
                <div class="date-grid">
                    <div class="header-box">
                        <label class="hb-label"><i class="fa-regular fa-calendar"></i> Início</label>
                        <input type="date" id="ed-start" class="hb-input" onchange="updateStudent('startDate', this.value)">
                    </div>
                    <div class="header-box">
                        <label class="hb-label"><i class="fa-solid fa-flag-checkered"></i> Fim</label>
                        <input type="date" id="ed-end" class="hb-input" onchange="updateStudent('expiryDate', this.value)">
                    </div>
                    
                    <!-- RESTORED CHECK-UP BOX -->
                    <div class="header-box checkup-box">
                        <label class="hb-label checkup-label">
                            <span><i class="fa-solid fa-user-doctor"></i> Check-up Semanal</span>
                            <span id="chk-next-date" class="chk-date-display">--/--</span>
                        </label>
                        <div class="checkup-controls">
                            <select id="ed-check-day" class="chk-select" onchange="updateCheckup()">
                                <option value="">Dia...</option>
                                <option value="Seg">Segunda</option>
                                <option value="Ter">Terça</option>
                                <option value="Qua">Quarta</option>
                                <option value="Qui">Quinta</option>
                                <option value="Sex">Sexta</option>
                                <option value="Sáb">Sábado</option>
                                <option value="Dom">Domingo</option>
                            </select>
                            <span style="color:rgba(255,255,255,0.3)">|</span>
                            <input type="time" id="ed-check-time" class="hb-input" style="width: 70px; text-align:center;" onchange="updateCheckup()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB NAV -->
            <div class="app-tabs">
                <div class="app-tab active" id="tab-train" onclick="switchView('train')"><i class="fa-solid fa-dumbbell"></i></div>
                <div class="app-tab" id="tab-logic" onclick="switchView('logic')"><i class="fa-solid fa-brain"></i></div>
            </div>

            <!-- CANVAS -->
            <div id="editor-canvas" class="editor-content">
                <!-- Blocks rendered here -->
            </div>
            
            <!-- METHODOLOGY CANVAS (NEW) -->
            <div id="method-canvas" class="editor-content" style="display:none">
                <!-- Methodology rendered here -->
            </div>
        </div>

        <!-- ACTIONS & BUILDER (SIDE PANEL INSIDE WORKSPACE) -->
        <div class="preview-actions">
            <h4 style="margin:0 0 10px 0; color:var(--primary); font-size:0.9rem;">Ações</h4>
            <button class="pa-btn-wide pa-tiny" onclick="copyTinyUrlFlow()"><i class="fa-solid fa-link"></i> <span>Gerar Link</span></button>
            <button class="pa-btn-wide" onclick="previewWorkout()" style="background: #f59e0b;"><i class="fa-solid fa-eye"></i> <span>Preview</span></button>
            <button class="pa-btn-wide pa-update" onclick="saveToCloud('PATCH')"><i class="fa-solid fa-cloud-arrow-up"></i> <span>Salvar Alterações</span></button>
            <button class="pa-btn-wide pa-link" onclick="generateOffline()"><i class="fa-solid fa-wifi"></i> <span>Link Offline</span></button>
            <button class="pa-btn-wide" onclick="deleteCurrentStudent()" style="background: var(--danger);"><i class="fa-solid fa-trash"></i> <span>Excluir Aluno</span></button>

            <!-- BUILDER MENU -->
            <div class="builder-controls">
                <div class="builder-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>CONSTRUTOR</span>
                    <select id="target-stage-select" style="font-size:0.65rem; padding:2px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text); outline:none; cursor:pointer;">
                        <option value="mobilidade">Mobilidade</option>
                        <option value="ativacao">Ativação</option>
                        <option value="forca" selected>Força</option>
                        <option value="desaceleracao">Desaceleração</option>
                    </select>
                </div>
                <div class="b-grid">
                    <button class="b-btn bb-block" onclick="addBlock()"><i class="fa-solid fa-layer-group"></i> NOVO BLOCO</button>
                    
                    <button class="b-btn bb-iso" onclick="addMethod('Normal')"><i class="fa-solid fa-dumbbell"></i> Isolado</button>
                    <button class="b-btn bb-bi" onclick="addMethod('Bi-set')"><i class="fa-solid fa-link"></i> Bi-set</button>
                    <button class="b-btn bb-tri" onclick="addMethod('Tri-set')"><i class="fa-solid fa-link"></i> Tri-set</button>
                    <button class="b-btn bb-drop" onclick="addMethod('Drop-set')"><i class="fa-solid fa-stairs"></i> Drop-set</button>
                    <button class="b-btn bb-rest" onclick="addMethod('Rest-Pause')"><i class="fa-solid fa-stopwatch"></i> Rest-Pause</button>
                    <button class="b-btn bb-static" onclick="addMethod('Isometria')"><i class="fa-solid fa-pause"></i> Isometria</button>
                    <button class="b-btn bb-pyr" onclick="addMethod('Pirâmide')"><i class="fa-solid fa-arrow-up-right-dots"></i> Pirâmide</button>
                    <button class="b-btn bb-gvt" onclick="addMethod('GVT')"><i class="fa-solid fa-g"></i> GVT (10x10)</button>
                    <button class="b-btn bb-fst" onclick="addMethod('FST-7')"><i class="fa-solid fa-f"></i> FST-7</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. RIGHT (LIBRARY GAVETA) -->
    <div class="right-panel">
        <div class="rp-header">
            <div class="rp-tabs">
                <div class="rp-tab active" onclick="switchRightTab('lib')" id="rt-lib">Biblioteca</div>
                <div class="rp-tab" onclick="switchRightTab('method')" id="rt-method">Metodologia</div>
            </div>
            
            <!-- LIBRARY CONTROLS -->
            <div id="lib-controls">
                <input class="search-inp" id="lib-search" style="padding:8px 10px; height:36px; font-size:0.8rem; margin-bottom:10px;" placeholder="Buscar exercício..." onkeyup="renderLibrary()">
                
                <!-- NEW FILTERS WITH GEARS -->
                <div class="filter-row">
                    <div class="filter-group-row">
                        <select id="filter-group" class="filter-select" onchange="renderLibrary()"></select>
                        <i class="fa-solid fa-gear filter-gear" onclick="openCatManager('groups')" title="Gerenciar Grupos"></i>
                    </div>
                    <div class="filter-group-row">
                        <select id="filter-equip" class="filter-select" onchange="renderLibrary()"></select>
                        <i class="fa-solid fa-gear filter-gear" onclick="openCatManager('equips')" title="Gerenciar Equipamentos"></i>
                    </div>
                    <div class="filter-group-row">
                        <select id="filter-method" class="filter-select" onchange="renderLibrary()"></select>
                        <i class="fa-solid fa-gear filter-gear" onclick="openCatManager('methods')" title="Gerenciar Métodos"></i>
                    </div>
                </div>

                <button class="btn-primary-block" style="padding:10px; font-size:0.8rem; margin:0;" onclick="openLibModal()">+ Novo Exercício</button>
            </div>
        </div>

        <div class="lib-content" id="right-content">
            <!-- Library Items here -->
        </div>
    </div>

</div>

<!-- MODAL: ADD EXERCISE (UPDATED) -->
<div id="modal-lib" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <span style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-dumbbell" style="color:var(--primary)"></i> 
                Novo Exercício
            </span>
            <i class="fa-solid fa-xmark" onclick="closeModal('modal-lib')" style="cursor:pointer"></i>
        </div>
        <input type="hidden" id="lib-id">

        <!-- NAME -->
        <div class="lib-field-row" style="border-left: 4px solid var(--text);">
            <label>Nome do Exercício</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-pen-nib"></i>
                <input id="lib-name" placeholder="Ex: Supino Reto">
            </div>
        </div>

        <!-- GROUP -->
        <div class="lib-field-row" style="border-left: 4px solid var(--primary);">
            <div style="display:flex; justify-content:space-between;">
                <label style="color:var(--primary)">Grupo Muscular</label>
                <i class="fa-solid fa-gear" onclick="openCatManager('groups')" style="cursor:pointer; color:var(--text-muted)" title="Gerenciar Grupos"></i>
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-layer-group" style="color:var(--primary)"></i>
                <select id="lib-group"></select>
            </div>
        </div>

        <!-- EQUIP -->
        <div class="lib-field-row" style="border-left: 4px solid var(--warning);">
            <div style="display:flex; justify-content:space-between;">
                <label style="color:var(--warning)">Equipamento</label>
                <i class="fa-solid fa-gear" onclick="openCatManager('equips')" style="cursor:pointer; color:var(--text-muted)" title="Gerenciar Equipamentos"></i>
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-screwdriver-wrench" style="color:var(--warning)"></i>
                <select id="lib-equip"></select>
            </div>
        </div>

        <!-- METHOD (UPDATED WITH GEAR) -->
        <div class="lib-field-row" style="border-left: 4px solid var(--purple);">
            <div style="display:flex; justify-content:space-between;">
                <label style="color:var(--purple)">Método de Treinamento</label>
                <i class="fa-solid fa-gear" onclick="openCatManager('methods')" style="cursor:pointer; color:var(--text-muted)" title="Gerenciar Métodos"></i>
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-bolt" style="color:var(--purple)"></i>
                <select id="lib-method"></select>
            </div>
        </div>

        <!-- VIDEO -->
        <div class="lib-field-row" style="border-left: 4px solid var(--danger);">
            <label style="color:var(--danger)">Vídeo Demonstração</label>
            <div class="input-wrapper">
                <i class="fa-brands fa-youtube" style="color:var(--danger)"></i>
                <input id="lib-video" placeholder="Link do YouTube">
            </div>
        </div>

        <button class="btn-primary-block" onclick="saveLibItem()" style="margin-top:20px;">
            <i class="fa-solid fa-check"></i> Salvar na Biblioteca
        </button>
    </div>
</div>

<!-- MODAL: CATEGORY MANAGER -->
<div id="modal-cat" class="modal">
    <div class="modal-box">
        <div class="modal-head"><span id="cat-modal-title">Gerenciar</span> <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="closeModal('modal-cat')"></i></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input id="new-cat-name" class="search-inp" placeholder="Nova opção...">
            <button class="btn-icon-sm" onclick="addCategory()"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id="cat-list" style="display:flex; flex-direction:column; gap:6px;"></div>
    </div>
</div>

<!-- MODAL: PILLAR MANAGER (NEW) -->
<div id="modal-pillar" class="modal">
    <div class="modal-box">
        <div class="modal-head"><span id="pillar-modal-title">Novo Pilar</span> <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="closeModal('modal-pillar')"></i></div>
        <input type="hidden" id="pillar-idx">
        
        <div class="lib-field-row">
            <label>Título do Pilar</label>
            <div class="input-wrapper"><input id="pillar-title" placeholder="Ex: Cadência"></div>
        </div>
        
        <div class="lib-field-row">
            <label>Descrição</label>
            <textarea id="pillar-text" class="input-wrapper" style="width:100%; min-height:60px; padding:10px; font-family:var(--font-body);" placeholder="Explicação..."></textarea>
        </div>

        <div style="margin-bottom:15px;">
            <label class="stat-lbl" style="margin-bottom:5px; display:block;">Ícone</label>
            <div class="grid-select" id="pillar-icons">
                <!-- JS populated -->
            </div>
        </div>

        <div style="margin-bottom:15px;">

    function renderStudentList(filter="") {
        const l = document.getElementById('studentList'); l.innerHTML = '';
        const term = filter.toLowerCase();
        
        appData.students.filter(s => s.name.toLowerCase().includes(term)).forEach(s => {
            let progress = 0;
            let daysLeft = 0;
            let statusColor = "var(--success)";
            
            if(s.startDate && s.expiryDate) {
                const start = new Date(s.startDate);
                const end = new Date(s.expiryDate);
                const now = new Date();
                const total = end - start;
                const elapsed = now - start;
                daysLeft = Math.ceil((end - now)/(1000*60*60*24));
                if(total > 0) progress = Math.min(100, Math.max(0, (elapsed/total)*100));
                
                if(daysLeft < 3) statusColor = "var(--danger)";
                else if(daysLeft < 10) statusColor = "var(--warning)";
            }

            const activeClass = currentStudent && currentStudent.id === s.id ? 'active' : '';
            const checkInfo = (s.checkUpDay && s.checkUpTime) ? `📅 ${s.checkUpDay} • ${s.checkUpTime}` : '';

            l.innerHTML += `
            <div class="s-item ${activeClass}" onclick="loadStudent('${s.id}')">
                <div class="s-header">
                    <span class="s-name">${s.name}</span>
                    <span class="s-days" style="color:${statusColor}; background:color-mix(in srgb, ${statusColor} 10%, white);">${daysLeft}d</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${progress}%; background:${statusColor}"></div></div>
                <div class="s-footer">
                    <span>${s.focus}</span>
                    ${checkInfo ? `<span class="checkup-badge">${checkInfo}</span>` : ''}
                </div>
            </div>`;
        });
    }

    function loadStudent(id) {
        const newStudent = appData.students.find(s => String(s.id) === String(id));
        if(!newStudent) return;

        // Data migration check for old students without pillars/logic structure
        if (!newStudent.logic || typeof newStudent.logic === 'string') newStudent.logic = [];
        if (!newStudent.pillars) newStudent.pillars = JSON.parse(JSON.stringify(appData.pillars));

        // Migrate old blocks to new stages structure
        if (newStudent.blocks) {
            newStudent.blocks.forEach(blk => {
                if (blk.items && !blk.stages) {
                    blk.stages = {
                        mobilidade: [],
                        ativacao: [],
                        forca: blk.items,
                        desaceleracao: []
                    };
                    delete blk.items;
                }
            });
        }

        triggerPreviewFade(() => {
            currentStudent = newStudent;
            renderStudentList(document.querySelector('.search-inp').value);

            document.getElementById('ed-name').value = currentStudent.name;
            resizeNameInput(document.getElementById('ed-name'));
            document.getElementById('ed-focus').value = currentStudent.focus;
            document.getElementById('ed-start').value = currentStudent.startDate;
            document.getElementById('ed-end').value = currentStudent.expiryDate;
            
            // Check-up Restore
            document.getElementById('ed-check-day').value = currentStudent.checkUpDay || "";
            document.getElementById('ed-check-time').value = currentStudent.checkUpTime || "";
            
            calcNextCheckup();
            switchRightTab('lib');
            renderEditor(); // Render Workout

    function updateStudent(field, val) {

    function resizeNameInput(el) {

    // --- CHECKUP LOGIC ---
    function updateCheckup() {
        if(!currentStudent) return;
        currentStudent.checkUpDay = document.getElementById('ed-check-day').value;
        currentStudent.checkUpTime = document.getElementById('ed-check-time').value;
        calcNextCheckup();
        saveLocal();
        renderStudentList(document.querySelector('.search-inp').value);
    }

    function calcNextCheckup() {
        const dayMap = { 'Seg': 1, 'Ter': 2, 'Qua': 3, 'Qui': 4, 'Sex': 5, 'Sáb': 6, 'Dom': 0 };
        const dayStr = document.getElementById('ed-check-day').value;
        const disp = document.getElementById('chk-next-date');
        
        if (!dayStr || dayMap[dayStr] === undefined) {
            disp.innerText = "--/--";
            return;
        }

        const targetDay = dayMap[dayStr];
        const d = new Date();
        const today = d.getDay();
        
        let diff = targetDay - today;
        if (diff <= 0) diff += 7; // Next occurrence
        
        d.setDate(d.getDate() + diff);
        
        const dateStr = d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
        disp.innerText = dateStr;
    }

        tabs.forEach(t => t.classList.remove('active'));
        
        if (view === 'train') {
            document.getElementById('tab-train').classList.add('active');
            trainCanvas.style.display = 'block';
            methodCanvas.style.display = 'none';
        } else if (view === 'logic') {
            document.getElementById('tab-logic').classList.add('active');
            trainCanvas.style.display = 'none';
            methodCanvas.style.display = 'block';
            renderPhoneMethodology();

                html += `

                    <div class="ph-pillar-head" style="color: ${color};"><i class="fa-solid ${p.icon}"></i> ${p.title}</div>
                    <div class="ph-pillar-text">${p.text}</div>

            });

        html += '</div>';
        container.innerHTML = html;

                            const bodyDisplay = isCollapsed ? 'none' : 'grid';
                            const obsDisplay = isCollapsed ? 'none' : 'flex';

                                        <div style="width:100%; display:flex; align-items:center; gap:8px;">
                                            <i class="fa-regular ${checkIcon}" style="color:${checkColor}; font-size:1.1rem; cursor:pointer; transition:0.2s;" title="Marcar como concluído" onclick="toggleItemCollapse(${bIdx}, '${stg.id}', ${iIdx})"></i>

                                        <div class="stat-input-grp"><label class="stat-lbl">Reps</label><input class="stat-inp" type="text" value="${item.reps}" onchange="updItem(${bIdx}, '${stg.id}', ${iIdx}, 'reps', this.value)" ${isLocked?'disabled':''}></div>
                                        <div class="stat-input-grp"><label class="stat-lbl">Descanso</label><input class="stat-inp" type="text" value="${item.rest}" onchange="updItem(${bIdx}, '${stg.id}', ${iIdx}, 'rest', this.value)" ${isLocked?'disabled':''}></div>

    function renderMethodFields(method, bIdx, stageId, iIdx, currentVal, locked) {
        let html = '';
        const disabled = locked ? 'disabled' : '';
        const val = currentVal || '';
        
        if (method === 'Isometria') {
            html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Tempo Isometria (seg)" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === 'Drop-set') {
            html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Qtd Drops / Detalhes" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === 'Rest-Pause') {
            html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Pausa (seg) / Falhas" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === 'Pirâmide') {
            html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Cargas (Ex: 10/12/14kg)" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        }
        return html;
    }

    function toggleItemCollapse(bIdx, stageId, iIdx) {
        haptic('light');
        const item = currentStudent.blocks[bIdx].stages[stageId][iIdx];
        item.collapsed = !item.collapsed;
        saveLocal();
        renderEditor();
    }

    function toggleBlockCollapse(bIdx) {
        haptic('light');
        currentStudent.blocks[bIdx].collapsed = !currentStudent.blocks[bIdx].collapsed;
        saveLocal(); renderEditor();
    }

    function addBlock() { haptic('medium'); currentStudent.blocks.push({ name: "Bloco " + String.fromCharCode(65 + currentStudent.blocks.length), desc: "", locked: false, collapsed: false, stages: { mobilidade: [], ativacao: [], forca: [], desaceleracao: [] } }); saveLocal(); renderEditor(); }
    function toggleLock(bIdx) { haptic('light'); currentStudent.blocks[bIdx].locked = !currentStudent.blocks[bIdx].locked; saveLocal(); renderEditor(); }
    function delBlock(bIdx) { haptic('heavy'); if(confirm("Excluir bloco?")) { currentStudent.blocks.splice(bIdx, 1); saveLocal(); renderEditor(); } }
    function updBlock(bIdx, field, val) { currentStudent.blocks[bIdx][field] = val; saveLocal(); }
    function updItem(bIdx, stageId, iIdx, field, val) { currentStudent.blocks[bIdx].stages[stageId][iIdx][field] = val; saveLocal(); }
    function delItem(bIdx, stageId, iIdx) { haptic('heavy'); if(confirm("Remover exercício?")) { currentStudent.blocks[bIdx].stages[stageId].splice(iIdx, 1); saveLocal(); renderEditor(); } }
    function moveBlock(oldIdx, newIdx) { haptic('light'); const item = currentStudent.blocks.splice(oldIdx, 1)[0]; currentStudent.blocks.splice(newIdx, 0, item); saveLocal(); }
    function moveItem(fromId, toId, oldIdx, newIdx) { 
        haptic('light');
        const fromMatch = fromId.match(/blk-(\d+)-stage-(.+)/);
        const toMatch = toId.match(/blk-(\d+)-stage-(.+)/);
        if(!fromMatch || !toMatch) return;
        const fromBIdx = parseInt(fromMatch[1]);
        const fromStage = fromMatch[2];
        const toBIdx = parseInt(toMatch[1]);
        const toStage = toMatch[2];
        const item = currentStudent.blocks[fromBIdx].stages[fromStage].splice(oldIdx, 1)[0]; 
        currentStudent.blocks[toBIdx].stages[toStage].splice(newIdx, 0, item); 
        saveLocal(); 
    }

    // --- ADD METHOD ---
    function addMethod(type) {
        haptic('medium');
        if(currentStudent.blocks.length === 0) { addBlock(); setTimeout(() => addMethod(type), 50); return; }
        const lastBlock = currentStudent.blocks[currentStudent.blocks.length - 1];
        if(lastBlock.locked) return alert("O último bloco está bloqueado.");
        if(lastBlock.collapsed) { lastBlock.collapsed = false; } 

        const targetStage = document.getElementById('target-stage-select').value;

        const createItem = (m, name="Novo Exercício") => ({
            name: name,
            sets: (m==='GVT'?'10':(m==='FST-7'?'7':'3')),
            reps: (m==='GVT'?'10':(m==='FST-7'?'8-12':'10')),
            rest: (m==='FST-7'?'30s':'60s'),
            restEx: "", method: m, extra: "", note: "", collapsed: false
        });

        if(type === 'Bi-set') {
            lastBlock.stages[targetStage].push(createItem('Bi-set', 'Exercício A'));
            lastBlock.stages[targetStage].push(createItem('Bi-set', 'Exercício B'));
        } else if(type === 'Tri-set') {
            lastBlock.stages[targetStage].push(createItem('Tri-set', 'Exercício A'));
            lastBlock.stages[targetStage].push(createItem('Tri-set', 'Exercício B'));
            lastBlock.stages[targetStage].push(createItem('Tri-set', 'Exercício C'));
        } else {
            lastBlock.stages[targetStage].push(createItem(type));
        }
        saveLocal(); renderEditor();
        const cv = document.getElementById('editor-canvas'); setTimeout(() => cv.scrollTop = cv.scrollHeight, 100);
    }

    // --- RIGHT PANEL (RESTORED & FIXED) ---
    function switchRightTab(tab) {
        document.querySelectorAll('.rp-tab').forEach(t => t.classList.remove('active'));
        const tabEl = document.getElementById('rt-'+tab);
        if (tabEl) tabEl.classList.add('active');
        const cont = document.getElementById('right-content');
        if (tab === 'lib') { document.getElementById('lib-controls').style.display = 'block'; renderLibrary(); } 
        else { document.getElementById('lib-controls').style.display = 'none'; renderMethodology(cont); }
    }

    function renderMethodology(container) {
        if (!currentStudent) return;
        
        // Ensure data arrays exist
        if (!currentStudent.pillars) currentStudent.pillars = JSON.parse(JSON.stringify(appData.pillars));

        // Pillars Section
        let pillarsHTML = '';
        currentStudent.pillars.forEach((p, idx) => {
            const colorClass = p.color || 'p-blue';
            pillarsHTML += `
            <div class="pillar-card ${colorClass}" data-idx="${idx}">
                <div class="p-drag-handle"><i class="fa-solid fa-grip-vertical"></i></div>
                <div class="p-head">
                    <span class="p-title"><i class="fa-solid ${p.icon}"></i> ${p.title}</span>
                    <div class="p-actions">
                        <i class="fa-solid fa-pencil p-btn-edit" onclick="openPillarModal(${idx})"></i>
                        <i class="fa-solid fa-trash p-btn-del" onclick="deletePillar(${idx})"></i>
                    </div>
                </div>
                <textarea class="p-text-area" onchange="updatePillarItem(${idx}, this.value)">${p.text}</textarea>
            </div>`;
        });

        container.innerHTML = `
            <!-- PILLARS -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div style="font-weight:800; color:var(--accent); font-size:0.9rem; text-transform:uppercase;">Pilares do Treinamento</div>
                    <button class="btn-icon-sm" onclick="resetPillars()" title="Restaurar Padrão" style="font-size:0.7rem; width:auto; padding:4px 8px; height:auto; background:var(--bg); border:1px solid var(--border); color:var(--text-muted);"><i class="fa-solid fa-rotate-right"></i> Restaurar</button>
                </div>
                <div class="pillar-list">${pillarsHTML}</div>
                <button class="btn-primary-block" onclick="openPillarModal('NEW')" style="margin-top:10px; font-size:0.8rem; padding:8px;">+ Novo Pilar</button>
            </div>
        `;

        // Initialize Sortable for Pillars
        new Sortable(container.querySelector('.pillar-list'), {
            animation: 150,
            handle: '.p-drag-handle',
            onEnd: function (evt) {
                const item = currentStudent.pillars.splice(evt.oldIndex, 1)[0];
                currentStudent.pillars.splice(evt.newIndex, 0, item);
                saveLocal();
                if(document.getElementById('method-canvas').style.display === 'block') {
                    renderPhoneMethodology();
                }
            }
        });
    }

    // --- METHODOLOGY ACTIONS ---
    function resetPillars() {
        if(confirm("Deseja restaurar os pilares para o padrão do sistema? Isso substituirá os atuais.")) {
            currentStudent.pillars = JSON.parse(JSON.stringify(appData.pillars));
            saveLocal();
            switchRightTab('method');
            if(document.getElementById('method-canvas').style.display === 'block') renderPhoneMethodology();
        }
    }

    function updatePillarItem(idx, val) { currentStudent.pillars[idx].text = val; saveLocal(); }
    
    function movePillar(oldIdx, newIdx) {
        const item = currentStudent.pillars.splice(oldIdx, 1)[0];
        currentStudent.pillars.splice(newIdx, 0, item);
        saveLocal();
        // Check if phone preview is active for methodology to update it live
        if(document.getElementById('method-canvas').style.display === 'block') {
            renderPhoneMethodology();
        }
    }

    // --- PILLAR MANAGER ---
    function openPillarModal(idx) {
        document.getElementById('modal-pillar').style.display = 'flex';
        const titleInput = document.getElementById('pillar-title');
        const textInput = document.getElementById('pillar-text');
        const idxInput = document.getElementById('pillar-idx');
        
        renderPillarSelectors(); // Render icons and colors

        if (idx === 'NEW') {
            document.getElementById('pillar-modal-title').innerText = 'Novo Pilar';
            idxInput.value = 'NEW';
            titleInput.value = '';
            textInput.value = '';
            selectedPillarIcon = 'fa-star';
            selectedPillarColor = 'p-blue';
        } else {
            document.getElementById('pillar-modal-title').innerText = 'Editar Pilar';
            const p = currentStudent.pillars[idx];
            idxInput.value = idx;
            titleInput.value = p.title;
            textInput.value = p.text;
            selectedPillarIcon = p.icon;
            selectedPillarColor = p.color;
        }
        updatePillarSelectionUI();
    }

    function renderPillarSelectors() {
        const iconGrid = document.getElementById('pillar-icons');
        const colorGrid = document.getElementById('pillar-colors');
        iconGrid.innerHTML = '';
        colorGrid.innerHTML = '';

        AVAILABLE_ICONS.forEach(icon => {
            iconGrid.innerHTML += `<div class="icon-opt" onclick="selectPillarIcon('${icon}')" id="pi-${icon}"><i class="fa-solid ${icon}"></i></div>`;
        });

        AVAILABLE_COLORS.forEach(color => {
            let bg = '';
            if(color==='p-red') bg='#ef4444';
            if(color==='p-cyan') bg='#06b6d4';
            if(color==='p-purple') bg='#a855f7';
            if(color==='p-blue') bg='#3b82f6';
            if(color==='p-green') bg='#10b981';
            if(color==='p-orange') bg='#f97316';
            if(color==='p-pink') bg='#ec4899';
            colorGrid.innerHTML += `<div class="color-opt" onclick="selectPillarColor('${color}')" id="pc-${color}" style="background:${bg}"></div>`;
        });
    }

    function selectPillarIcon(icon) { selectedPillarIcon = icon; updatePillarSelectionUI(); }
    function selectPillarColor(color) { selectedPillarColor = color; updatePillarSelectionUI(); }

    function updatePillarSelectionUI() {
        document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('selected'));
        document.getElementById(`pi-${selectedPillarIcon}`).classList.add('selected');
        document.getElementById(`pc-${selectedPillarColor}`).classList.add('selected');
    }

    function savePillar() {
        const idx = document.getElementById('pillar-idx').value;
        const title = document.getElementById('pillar-title').value;
        const text = document.getElementById('pillar-text').value;

        if (!title) return alert("Título obrigatório");

        const newPillar = { title, text, icon: selectedPillarIcon, color: selectedPillarColor };

        if (idx === 'NEW') {
            currentStudent.pillars.push(newPillar);
        } else {
            currentStudent.pillars[parseInt(idx)] = newPillar;
        }
        
        saveLocal();
        closeModal('modal-pillar');
        switchRightTab('method'); // Refresh right panel
        
        // Refresh phone view if active
        if(document.getElementById('method-canvas').style.display === 'block') {
            renderPhoneMethodology();
        }
    }

    function deletePillar(idx) {
        if(confirm("Remover este pilar?")) {
            currentStudent.pillars.splice(idx, 1);
            saveLocal();
            switchRightTab('method');
            if(document.getElementById('method-canvas').style.display === 'block') renderPhoneMethodology();
        }
    }

    // --- LIBRARY FILTERING & RENDERING (NEW) ---
    function renderLibrary() {
        if(document.querySelector('.rp-tab.active').id !== 'rt-lib') return;
        
        // Populate Filter Selects if empty
        const grpSel = document.getElementById('filter-group');
        if(grpSel.options.length === 0) {
            grpSel.add(new Option('Grupo: Todos', ''));
            appData.groups.forEach(g => grpSel.add(new Option(g, g)));
        }
        const eqSel = document.getElementById('filter-equip');
        if(eqSel.options.length === 0) {
            eqSel.add(new Option('Equip: Todos', ''));
            appData.equips.forEach(e => eqSel.add(new Option(e, e)));
        }
        const metSel = document.getElementById('filter-method');
        if(metSel.options.length === 0) {
            metSel.add(new Option('Método: Todos', ''));
            appData.methods.forEach(m => metSel.add(new Option(m, m)));
        }

        const c = document.getElementById('right-content'); c.innerHTML = '';
        
        const term = document.getElementById('lib-search').value.toLowerCase();
        const fGrp = document.getElementById('filter-group').value;
        const fEq = document.getElementById('filter-equip').value;
        const fMet = document.getElementById('filter-method').value;

        appData.library.forEach((ex, idx) => {
            // Apply Filters
            if(term && !ex.name.toLowerCase().includes(term)) return;
            if(fGrp && ex.group !== fGrp) return;
            if(fEq && ex.equip !== fEq) return;
            if(fMet && ex.method !== fMet) return;

            const vidIcon = ex.video ? '<i class="fa-brands fa-youtube" style="color:red"></i>' : '';
            const metLabel = ex.method || 'Musculação';
            
            c.innerHTML += `
            <div class="lib-card">
                <div class="lc-head">
                    <div class="lc-title">${ex.name} ${vidIcon}</div>
                </div>
                <div class="lc-badges">
                    <span class="lc-badge bg-grp">${ex.group}</span>
                    <span class="lc-badge bg-eq">${ex.equip}</span>
                    <span class="lc-badge bg-met">${metLabel}</span>
                </div>
                <div class="lc-actions">
                    <div class="lc-btn lc-btn-edit" onclick="openLibModal(${idx})" title="Editar"><i class="fa-solid fa-pencil"></i></div>
                    <div class="lc-btn lc-btn-del" onclick="deleteLibItem(${idx})" title="Excluir"><i class="fa-solid fa-trash"></i></div>
                    <button class="lc-btn lc-btn-add" onclick="addFromLib(${idx})"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>`;
        });
        
        if(c.innerHTML === '') c.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px;">Nenhum exercício encontrado.</div>';
    }

    function openLibModalForStage(bIdx, stageId) {
        targetBlockIdx = bIdx;
        targetStageId = stageId;
        switchRightTab('lib');
        showToast("Selecione um exercício na biblioteca");
    }

    function addFromLib(idx) {
        if(currentStudent.blocks.length === 0) return alert("Crie um bloco de treino primeiro.");
        
        let bIdx = targetBlockIdx !== null ? targetBlockIdx : currentStudent.blocks.length - 1;
        let sId = targetStageId !== null ? targetStageId : 'forca';
        
        const targetBlock = currentStudent.blocks[bIdx];
        if(targetBlock.locked) return alert("O bloco está bloqueado.");
        
        const ex = appData.library[idx];
        targetBlock.stages[sId].push({ 
            name: ex.name, 
            sets: "3", 
            reps: "10", 
            rest: "60s", 
            restEx: "", 
            method: ex.method || 'Normal', 
            link: ex.video || '', 
            note: "" 
        });
        saveLocal(); 
        switchRightTab('method');
        renderEditor(); 
        showToast("Exercício adicionado!");
        
        targetBlockIdx = null;
        targetStageId = null;
    }
    
    function deleteLibItem(idx) {
        if(confirm("Excluir este exercício da biblioteca?")) {
            appData.library.splice(idx, 1);
            saveLocal();
            renderLibrary();
        }
    }
