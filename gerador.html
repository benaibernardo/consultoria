<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benai Manager | Studio CRM</title>
    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        customAlert(
          "Error: " + msg + "\nLine: " + lineNo + "\nColumn: " + columnNo,
        );
        return false;
      };
    </script>

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- THEME VARIABLES --- */
      :root {
        --primary: #001f5b;
        --accent: #00a8e8;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #1e293b;
        --text-muted: #64748b;
        --border: #cbd5e1;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --purple: #8b5cf6;
        --pink: #ec4899;

        --mgr-bg: #e2e8f0;
        --mgr-sidebar: #ffffff;
        --hover-item: #e0f2fe;

        --font-head: "Outfit", sans-serif;
        --font-body: "Plus Jakarta Sans", sans-serif;
      }

      [data-theme="dark"] {
        --primary: #bae6fd;
        --accent: #38bdf8;
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
        --mgr-bg: #020617;
        --mgr-sidebar: #0f172a;
        --success: #34d399;
        --warning: #fbbf24;
        --danger: #f87171;
        --hover-item: #1e3a8a;
      }

      * {
        box-sizing: border-box;
        outline: none;
        font-family: var(--font-body);
      }
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        overflow: hidden;
        background: var(--mgr-bg);
        color: var(--text);
        font-size: 13px;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* --- LAYOUT GRID --- */
      #main-layout {
        display: grid;
        grid-template-columns: 340px 1fr 320px;
        width: 100%;
        height: 100%;
      }

      /* --- COL 1: CRM SIDEBAR --- */
      .sidebar {
        background: var(--mgr-sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 20px;
        z-index: 20;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
      }

      .sb-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .brand {
        font-family: var(--font-head);
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-icon-sm {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-icon-sm:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--bg);
      }

      .btn-primary-block {
        background: var(--primary);
        color: var(--bg);
        border: none;
        padding: 12px;
        border-radius: 10px;
        width: 100%;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.2s;
      }
      .btn-primary-block:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      [data-theme="dark"] .btn-primary-block {
        color: #0f172a;
      }

      .btn-demo-block {
        background: var(--purple);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 10px;
        width: 100%;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.2s;
        font-size: 0.85rem;
      }
      .btn-demo-block:hover {
        background: #7c3aed;
        transform: translateY(-1px);
      }

      .search-box {
        position: relative;
        margin-bottom: 10px;
        margin-top: 5px;
      }
      .search-inp {
        width: 100%;
        padding: 10px 10px 10px 35px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 0.85rem;
        color: var(--text);
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
      }

      .student-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-right: 4px;
      }

      .s-item {
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid var(--border);
        background: var(--surface);
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .s-item:hover {
        border-color: var(--accent);
        transform: translateX(6px);
        background: var(--hover-item);
        box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.05);
      }
      .s-item.active {
        border-color: var(--primary);
        background: var(--bg);
        box-shadow: inset 4px 0 0 var(--primary);
      }

      .s-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .s-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--text);
      }
      .s-days {
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--bg);
      }

      .progress-track {
        width: 100%;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 2px;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.5s;
      }

      .s-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .checkup-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        color: var(--purple);
        font-weight: 700;
        background: rgba(139, 92, 246, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
      }

      /* --- COL 2: EDITOR WORKSPACE --- */
      .workspace {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
        overflow-y: auto;
        background: var(--mgr-bg);
        position: relative;
        gap: 20px;
      }

      .phone-frame {
        width: 520px;
        min-height: 850px;
        background: var(--bg);
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        border: 8px solid #1e293b;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
        flex-shrink: 0;
        transition: all 0.3s ease-in-out;
      }

      .preview-actions {
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: sticky;
        top: 20px;
        flex-shrink: 0;
      }

      .pa-btn-wide {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: 800;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        transition: 0.2s;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .pa-btn-wide:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .pa-tiny {
        background: #3b82f6;
      }
      .pa-update {
        background: #10b981;
      }
      .pa-link {
        background: #8b5cf6;
      }

      .builder-controls {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 15px;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      }
      .builder-header {
        font-size: 0.7rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 10px;
        letter-spacing: 1px;
      }
      .b-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .b-btn {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid transparent;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: flex-start;
      }
      .b-btn:hover {
        transform: translateY(-1px);
      }
      .bb-block {
        background: var(--primary);
        color: white;
        margin-bottom: 5px;
        justify-content: center;
      }
      .bb-iso {
        background: #f1f5f9;
        color: #475569;
        border-color: #cbd5e1;
      }
      .bb-bi {
        background: #eff6ff;
        color: #3b82f6;
        border-color: #bfdbfe;
      }
      .bb-tri {
        background: #f3e8ff;
        color: #8b5cf6;
        border-color: #ddd6fe;
      }
      .bb-drop {
        background: #fef2f2;
        color: #ef4444;
        border-color: #fecaca;
      }
      .bb-rest {
        background: #fff7ed;
        color: #f97316;
        border-color: #fed7aa;
      }
      .bb-static {
        background: #ecfeff;
        color: #06b6d4;
        border-color: #a5f3fc;
      }
      .bb-pyr {
        background: #eef2ff;
        color: #6366f1;
        border-color: #c7d2fe;
      }
      .bb-gvt {
        background: #ecfdf5;
        color: #10b981;
        border-color: #a7f3d0;
      }
      .bb-fst {
        background: #fce7f3;
        color: #db2777;
        border-color: #fbcfe8;
      }
      [data-theme="dark"] .b-btn:not(.bb-block) {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .app-header {
        background: #001f5b;
        padding: 30px 20px 20px 20px;
        color: white;
        border-radius: 0 0 30px 30px;
        box-shadow: 0 10px 25px rgba(0, 31, 91, 0.25);
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .brand-header {
        text-align: center;
      }
      .brand-title {
        font-family: var(--font-head);
        font-weight: 900;
        font-size: 1.2rem;
        color: var(--accent);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        line-height: 1;
      }
      .brand-sub {
        font-size: 0.6rem;
        opacity: 0.7;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 2px;
        font-weight: 600;
        color: white;
      }

      .student-header {
        text-align: center;
        margin-bottom: 5px;
      }
      .greeting-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        margin-bottom: 2px;
      }
      .greeting-text {
        font-family: var(--font-head);
        font-size: 1.6rem;
        font-weight: 800;
        color: white;
      }
      .inp-name-edit {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: white;
        font-family: var(--font-head);
        font-size: 1.6rem;
        font-weight: 800;
        width: auto;
        min-width: 50px;
        text-align: left;
        outline: none;
        transition: 0.2s;
        padding: 0;
      }
      .inp-name-edit:focus {
        border-bottom-color: var(--accent);
      }
      .inp-focus-edit {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--accent);
        width: 100%;
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 0.75rem;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
        outline: none;
      }
      .inp-focus-edit:focus {
        background: rgba(255, 255, 255, 0.2);
        border-color: var(--accent);
      }

      .date-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .header-box {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 8px 12px;
        transition: 0.2s;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .header-box:hover,
      .header-box:focus-within {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .hb-label {
        font-size: 0.6rem;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 700;
        margin-bottom: 2px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .hb-input {
        background: transparent;
        border: none;
        color: white;
        width: 100%;
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        outline: none;
      }

      .checkup-box {
        grid-column: span 2;
        background: rgba(139, 92, 246, 0.15);
        border-color: rgba(139, 92, 246, 0.3);
      }
      .checkup-box:hover,
      .checkup-box:focus-within {
        background: rgba(139, 92, 246, 0.25);
        border-color: rgba(139, 92, 246, 0.5);
      }
      .checkup-label {
        color: #e9d5ff;
      }
      .checkup-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .chk-select {
        background: transparent;
        border: none;
        color: white;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        outline: none;
        flex: 1;
      }
      .chk-select option {
        background: var(--primary);
        color: white;
      }
      .chk-date-display {
        font-size: 0.7rem;
        background: rgba(0, 0, 0, 0.2);
        padding: 2px 6px;
        border-radius: 4px;
        color: #ddd6fe;
        font-weight: 600;
        white-space: nowrap;
      }

      .fade-enter {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .fade-exit {
        animation: fadeOut 0.2s ease-in forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-5px);
        }
      }

      .app-tabs {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 15px 0;
        padding: 0 15px;
      }
      .app-tab {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: var(--text-muted);
        cursor: pointer;
        border: 1px solid var(--border);
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .app-tab.active {
        background: var(--primary);
        color: white;
        transform: translateY(-3px);
        border-color: var(--primary);
      }

      .editor-content {
        flex: 1;
        overflow-y: auto;
        padding: 0 15px 100px 15px;
        scroll-behavior: smooth;
      }

      /* --- BLOCKS & EXERCISES --- */
      .blk-wrapper {
        margin-bottom: 20px;
        border: 2px solid transparent;
        border-radius: 16px;
        background: var(--surface);
        overflow: hidden;
        transition: 0.2s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .blk-wrapper.locked {
        border-color: var(--warning);
        opacity: 0.9;
      }

      .blk-head {
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafc;
        border-bottom: 1px solid var(--border);
      }
      [data-theme="dark"] .blk-head {
        background: #1e293b;
      }

      .blk-handle {
        cursor: grab;
        padding: 5px;
        color: var(--text-muted);
      }
      .blk-handle:active {
        cursor: grabbing;
        color: var(--primary);
      }

      .blk-title-grp {
        flex: 1;
        margin-right: 10px;
        margin-left: 5px;
      }
      .inp-blk-title {
        font-family: var(--font-head);
        font-weight: 800;
        font-size: 1rem;
        color: var(--primary);
        background: transparent;
        border: none;
        width: 100%;
        display: block;
      }
      .inp-blk-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        background: transparent;
        border: none;
        width: 100%;
        font-style: italic;
        display: block;
        margin-top: 2px;
      }

      .blk-tools {
        display: flex;
        gap: 6px;
      }
      .bt-icon {
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-muted);
        background: var(--bg);
        border: 1px solid var(--border);
        font-size: 0.8rem;
        transition: 0.2s;
      }
      .bt-icon:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
      .bt-icon.min.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .bt-icon.lock.locked {
        background: var(--warning);
        color: white;
        border-color: var(--warning);
      }

      .blk-body {
        padding: 10px;
        min-height: 50px;
        transition: all 0.4s ease-in-out;
        overflow: hidden;
        max-height: 5000px;
        opacity: 1;
      }
      .blk-body.collapsed {
        max-height: 0;
        opacity: 0;
        padding: 0 10px;
        border: none;
      }

      /* EXERCISE CARD */
      .ex-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
        position: relative;
        border-left: 4px solid var(--border);
        transition: 0.2s;
        animation: fadeIn 0.3s ease-out;
      }
      .ex-card:hover {
        transform: translateX(2px);
        border-color: var(--accent);
      }

      .ex-drag-handle {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 15px;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        opacity: 0;
        transition: 0.2s;
        background: rgba(0, 0, 0, 0.02);
      }
      .ex-card:hover .ex-drag-handle {
        opacity: 0.5;
      }
      .ex-drag-handle:hover {
        opacity: 1;
        background: rgba(0, 0, 0, 0.05);
      }
      .ex-drag-handle i {
        font-size: 0.7rem;
      }

      /* Method Colors */
      .m-Normal {
        border-left-color: #cbd5e1;
      }
      .m-Bi-set {
        border-left-color: #3b82f6;
        background: #eff6ff;
      }
      .m-Tri-set {
        border-left-color: #8b5cf6;
        background: #f3e8ff;
      }
      .m-Drop-set {
        border-left-color: #ef4444;
        background: #fef2f2;
      }
      .m-Rest-Pause {
        border-left-color: #f97316;
        background: #fff7ed;
      }
      .m-Isometria {
        border-left-color: #06b6d4;
        background: #ecfeff;
      }
      .m-Pirâmide {
        border-left-color: #6366f1;
        background: #eef2ff;
      }
      .m-GVT {
        border-left-color: #10b981;
        background: #ecfdf5;
      }
      .m-FST-7 {
        border-left-color: #db2777;
        background: #fce7f3;
      }

      [data-theme="dark"] .m-Bi-set {
        background: rgba(59, 130, 246, 0.1);
      }
      [data-theme="dark"] .m-Tri-set {
        background: rgba(139, 92, 246, 0.1);
      }
      [data-theme="dark"] .m-Drop-set {
        background: rgba(239, 68, 68, 0.1);
      }
      [data-theme="dark"] .m-Rest-Pause {
        background: rgba(249, 115, 22, 0.1);
      }
      [data-theme="dark"] .m-Isometria {
        background: rgba(6, 182, 212, 0.1);
      }
      [data-theme="dark"] .m-Pirâmide {
        background: rgba(99, 102, 241, 0.1);
      }
      [data-theme="dark"] .m-GVT {
        background: rgba(16, 185, 129, 0.1);
      }
      [data-theme="dark"] .m-FST-7 {
        background: rgba(219, 39, 119, 0.1);
      }

      .ex-content-wrap {
        margin-left: 15px;
      }

      .ex-top-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
        gap: 8px;
      }
      .ex-title {
        font-weight: 800;
        color: var(--text);
        font-size: 0.95rem;
        font-family: var(--font-head);
        width: 100%;
        border: none;
        background: transparent;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .method-badge {
        font-size: 0.55rem;
        font-weight: 800;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: white;
        white-space: nowrap;
        cursor: default;
      }

      .ex-submenu {
        display: flex;
        gap: 4px;
      }
      .sm-btn {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        transition: 0.2s;
      }
      .sm-btn:hover {
        background: var(--bg);
        color: var(--accent);
      }
      .sm-btn.del:hover {
        color: var(--danger);
      }

      .ex-grid {
        display: grid;
        grid-template-columns: 0.8fr 1fr 0.8fr 0.8fr;
        gap: 4px;
        margin-bottom: 6px;
      }
      .stat-input-grp {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .stat-lbl {
        font-size: 0.55rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-left: 2px;
      }
      .stat-inp {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 6px;
        text-align: center;
        font-weight: 700;
        color: var(--primary);
        font-size: 0.85rem;
        width: 100%;
        font-family: var(--font-head);
      }
      .stat-inp:focus {
        border-color: var(--accent);
        background: white;
      }

      .extra-field-Row {
        margin-bottom: 6px;
      }
      .extra-inp {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 0.75rem;
        width: 100%;
        color: var(--text);
        font-weight: 600;
      }
      .ex-obs {
        width: 100%;
        background: #fefce8;
        border: 1px solid #fef08a;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 0.8rem;
        color: #854d0e;
        display: flex;
        gap: 5px;
        align-items: center;
      }
      [data-theme="dark"] .ex-obs {
        background: rgba(254, 240, 138, 0.1);
        border-color: rgba(254, 240, 138, 0.2);
        color: #fde047;
      }
      .ex-obs input {
        background: transparent;
        border: none;
        width: 100%;
        color: inherit;
        font-weight: 500;
        font-size: 0.75rem;
      }

      /* --- PREVIEW ACTIONS CONTAINER --- */
      .preview-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: sticky;
        top: 20px;
        z-index: 30;
        width: 260px; /* Fixed width for the side panel */
      }

      .pa-btn-wide {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: flex-start;
        font-size: 0.85rem;
        font-weight: 700;
        color: white;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 8px;
      }
      .pa-btn-wide:hover {
        transform: translateY(-2px);
        opacity: 0.95;
      }
      .pa-tiny {
        background: var(--success);
      }
      .pa-update {
        background: var(--warning);
      }
      .pa-link {
        background: var(--purple);
      }
      .pa-pdf {
        background: var(--danger);
      }

      /* --- BUILDER MENU --- */
      .builder-controls {
        margin-top: 10px;
        padding-top: 15px;
        border-top: 2px dashed var(--border);
      }
      .builder-header {
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 10px;
        letter-spacing: 1px;
      }

      .b-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .b-btn {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
      }
      .b-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      }
      .b-btn i {
        font-size: 0.9rem;
      }

      .bb-block {
        border-color: var(--primary);
        color: var(--primary);
        grid-column: span 2;
        justify-content: center;
        background: rgba(0, 31, 91, 0.05);
      }
      .bb-iso {
        border-left: 3px solid #cbd5e1;
      }
      .bb-bi {
        border-left: 3px solid #3b82f6;
      }
      .bb-tri {
        border-left: 3px solid #8b5cf6;
      }
      .bb-drop {
        border-left: 3px solid #ef4444;
      }
      .bb-rest {
        border-left: 3px solid #f97316;
      }
      .bb-static {
        border-left: 3px solid #06b6d4;
      }
      .bb-pyr {
        border-left: 3px solid #6366f1;
      }
      .bb-gvt {
        border-left: 3px solid #10b981;
      }
      .bb-fst {
        border-left: 3px solid #db2777;
      }

      /* --- RIGHT PANEL (LIBRARY) --- */
      .right-panel {
        background: var(--mgr-sidebar);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
      }

      .rp-header {
        padding: 15px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .rp-tabs {
        display: flex;
        gap: 5px;
        margin-bottom: 10px;
      }
      .rp-tab {
        flex: 1;
        padding: 8px;
        text-align: center;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .rp-tab.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      /* NEW LIBRARY LIST */
      .lib-content {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .lib-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: 0.2s;
      }
      .lib-card:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }

      .lc-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .lc-title {
        font-weight: 800;
        font-size: 0.9rem;
        color: var(--text);
        flex: 1;
      }
      .lc-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }

      .lc-badge {
        font-size: 0.6rem;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 700;
        text-transform: uppercase;
        color: white;
      }
      .bg-grp {
        background: var(--primary);
      }
      .bg-eq {
        background: var(--warning);
      }
      .bg-met {
        background: var(--purple);
      }

      .lc-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 4px;
      }
      .lc-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.8rem;
        border: 1px solid var(--border);
        background: var(--bg);
      }
      .lc-btn-add {
        background: var(--success);
        color: white;
        border-color: var(--success);
        width: 100%;
        font-weight: 700;
      }
      .lc-btn-add:hover {
        background: #059669;
      }
      .lc-btn-edit {
        color: var(--accent);
      }
      .lc-btn-edit:hover {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .lc-btn-del {
        color: var(--danger);
      }
      .lc-btn-del:hover {
        background: var(--danger);
        color: white;
        border-color: var(--danger);
      }

      /* FILTER ROW */
      .filter-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 10px;
      }
      .filter-select {
        flex: 1;
        padding: 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 0.75rem;
        background: var(--surface);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }

      .filter-group-row {
        display: flex;
        gap: 2px;
        align-items: center;
      }
      .filter-gear {
        color: var(--text-muted);
        font-size: 0.8rem;
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        transition: 0.2s;
      }
      .filter-gear:hover {
        background: var(--bg);
        color: var(--primary);
      }

      /* --- CLOUD MODAL (GRID RESTORED) --- */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-box {
        background: var(--surface);
        padding: 25px;
        border-radius: 24px;
        width: 500px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        color: var(--text);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--primary);
      }

      .cloud-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
      }
      .cloud-tile {
        padding: 15px;
        border-radius: 16px;
        border: 2px solid transparent;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-align: center;
        font-weight: 700;
        font-size: 0.8rem;
        transition: 0.2s;
      }
      .tile-save {
        background: #f0f9ff;
        color: #0ea5e9;
        border-color: #bae6fd;
      }
      .tile-save:hover {
        background: #0ea5e9;
        color: white;
      }
      .tile-backup {
        background: #f0fdf4;
        color: #10b981;
        border-color: #86efac;
      }
      .tile-backup:hover {
        background: #10b981;
        color: white;
      }
      .tile-restore {
        background: #fff7ed;
        color: #f97316;
        border-color: #fdba74;
      }
      .tile-restore:hover {
        background: #f97316;
        color: white;
      }
      .tile-import {
        background: #f5f3ff;
        color: #8b5cf6;
        border-color: #ddd6fe;
      }
      .tile-import:hover {
        background: #8b5cf6;
        color: white;
      }

      /* --- LIB MODAL STYLES (NEW) --- */
      .lib-field-row {
        background: var(--bg);
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .lib-field-row label {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 5px;
        display: block;
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 10px;
      }
      .input-wrapper i {
        font-size: 0.9rem;
        opacity: 0.7;
      }
      .input-wrapper input,
      .input-wrapper select,
      .input-wrapper textarea {
        border: none;
        background: transparent;
        padding: 10px 0;
        width: 100%;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--text);
        outline: none;
      }

      /* --- METHODOLOGY STYLES (NEW) --- */
      .pillar-card {
        background: var(--surface);
        border-radius: 12px;
        border-left: 4px solid;
        padding: 12px;
        margin-bottom: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        position: relative;
        padding-left: 25px; /* Add padding for handle */
      }

      /* New Dynamic Color Classes */
      .p-red {
        border-color: #ef4444;
        background: #fef2f2;
      }
      .p-cyan {
        border-color: #06b6d4;
        background: #ecfeff;
      }
      .p-purple {
        border-color: #a855f7;
        background: #f3e8ff;
      }
      .p-blue {
        border-color: #3b82f6;
        background: #eff6ff;
      }
      .p-green {
        border-color: #10b981;
        background: #ecfdf5;
      }
      .p-orange {
        border-color: #f97316;
        background: #fff7ed;
      }
      .p-pink {
        border-color: #ec4899;
        background: #fdf2f8;
      }

      .p-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .p-title {
        font-weight: 800;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: var(--text);
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .p-text-area {
        width: 100%;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-radius: 8px;
        padding: 8px;
        font-size: 0.85rem;
        color: var(--text);
        resize: vertical;
        min-height: 50px;
      }
      .p-actions {
        display: flex;
        gap: 8px;
        margin-left: auto;
      }
      .p-btn-edit {
        cursor: pointer;
        color: var(--text-muted);
        transition: 0.2s;
        font-size: 0.8rem;
      }
      .p-btn-edit:hover {
        color: var(--accent);
      }
      .p-btn-del {
        cursor: pointer;
        color: var(--text-muted);
        transition: 0.2s;
        font-size: 0.8rem;
      }
      .p-btn-del:hover {
        color: var(--danger);
      }

      /* PILLAR DRAG HANDLE */
      .p-drag-handle {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 20px;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        opacity: 0;
        transition: 0.2s;
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
      }
      .pillar-card:hover .p-drag-handle {
        opacity: 0.5;
      }
      .p-drag-handle:hover {
        opacity: 1;
        background: rgba(0, 0, 0, 0.05);
      }

      /* PHONE PREVIEW SPECIFIC STYLES */
      .ph-method-container {
        padding: 20px 15px;
      }
      .ph-section-title {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 5px;
      }

      .ph-pillar-card {
        background: var(--surface);
        border-radius: 16px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
      }
      .ph-pillar-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-weight: 800;
        font-size: 0.9rem;
        text-transform: uppercase;
      }
      .ph-pillar-text {
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.5;
      }

      /* GRID SELECTORS FOR PILLAR MODAL */
      .grid-select {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-bottom: 10px;
      }
      .icon-opt,
      .color-opt {
        cursor: pointer;
        border-radius: 8px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        transition: 0.2s;
      }
      .icon-opt:hover,
      .color-opt:hover {
        border-color: var(--accent);
      }
      .icon-opt.selected,
      .color-opt.selected {
        border-color: var(--primary);
        background: var(--bg);
        color: var(--primary);
      }

      .color-opt {
        height: 24px;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      .color-opt.selected {
        transform: scale(1.2);
        border: 2px solid var(--text);
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--primary);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: 700;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
        z-index: 200;
        opacity: 0;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="main-layout">
      <!-- 1. SIDEBAR (CRM) -->
      <div class="sidebar">
        <div class="sb-header">
          <div class="brand">
            <i class="fa-solid fa-dumbbell"></i> Benai Manager
          </div>
          <div style="display: flex; gap: 5px">
            <div
              class="btn-icon-sm"
              onclick="openCloudModal()"
              title="Dados e Nuvem"
              style="
                background: var(--accent);
                color: white;
                border-color: var(--accent);
              "
            >
              <i class="fa-solid fa-cloud"></i>
            </div>
            <div class="btn-icon-sm" onclick="toggleTheme()">
              <i class="fa-solid fa-circle-half-stroke"></i>
            </div>
          </div>
        </div>

        <button class="btn-primary-block" onclick="createStudent()">
          <i class="fa-solid fa-user-plus"></i> Novo Aluno
        </button>
        <button class="btn-demo-block" onclick="createFullDemo()">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Aluno Modelo
        </button>

        <div class="search-box">
          <i class="fa-solid fa-search search-icon"></i>
          <input
            class="search-inp"
            placeholder="Buscar aluno..."
            onkeyup="renderStudentList(this.value)"
          />
        </div>

        <div class="student-list" id="studentList"></div>
      </div>

      <!-- 2. CENTER (EDITOR + ACTIONS) -->
      <div class="workspace">
        <div class="phone-frame" id="phone-preview">
          <!-- HEADER -->
          <div class="app-header">
            <div class="brand-header">
              <div class="brand-title">BENAI BERNARDO</div>
              <div class="brand-sub">Consultoria de Treinamento</div>
            </div>

            <div class="student-header">
              <div class="greeting-wrapper">
                <span class="greeting-text">Olá, </span>
                <input
                  id="ed-name"
                  class="inp-name-edit"
                  value="Aluno"
                  oninput="
                    resizeNameInput(this);
                    updateStudent('name', this.value);
                  "
                  onchange="autoSaveGestao()"
                />
              </div>
              <input
                id="ed-focus"
                class="inp-focus-edit"
                placeholder="OBJETIVO"
                oninput="updateStudent('focus', this.value)"
                onchange="autoSaveGestao()"
              />
            </div>

            <div class="date-grid">
              <div class="header-box">
                <label class="hb-label"
                  ><i class="fa-regular fa-calendar"></i> Início</label
                >
                <input
                  type="date"
                  id="ed-start"
                  class="hb-input"
                  onchange="
                    updateStudent('startDate', this.value);
                    autoSaveGestao();
                  "
                />
              </div>
              <div class="header-box">
                <label class="hb-label"
                  ><i class="fa-solid fa-flag-checkered"></i> Fim</label
                >
                <input
                  type="date"
                  id="ed-end"
                  class="hb-input"
                  onchange="
                    updateStudent('expiryDate', this.value);
                    autoSaveGestao();
                  "
                />
              </div>

              <!-- PLANO ATUAL BOX -->
              <div
                class="header-box"
                style="
                  background: rgba(255, 255, 255, 0.05);
                  border: 1px solid rgba(255, 255, 255, 0.1);
                "
              >
                <label class="hb-label" style="color: var(--accent)"
                  ><i class="fa-solid fa-star"></i> Plano Atual</label
                >
                <select
                  id="ed-plano"
                  class="chk-select"
                  style="width: 100%; margin-top: 5px"
                  onchange="updateStudent('planoAtual', this.value)"

      async function handleInitialLoad() {
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get("email");
        const nomeParam  = urlParams.get("nome");

        if (emailParam) {
          let existingStudent = appData.students.find(s => s.email === emailParam);

          if (existingStudent) {
            // Aluno já existe no gerador — só carrega
            saveLocal();
            loadStudent(existingStudent.id);

          } else {
            // Aluno novo — busca dados completos da anamnese no Sheets
            showToast("Buscando dados do aluno...");

            let dadosAnamnese = {};
            try {
              const url = "https://script.google.com/macros/s/AKfycbxBLR5u1BVTJoD8HYwBF603lSfXKkJBXqf9voHfcUiywxgsAsJ8tLeClhNL-1gdeHRf/exec?tipo=anamnese";
              const response = await fetch(url);
              const todasAnamneses = await response.json();

              // Busca pelo e-mail do aluno (campo "E-mail" com hífen)
              const registro = todasAnamneses.find(a => a["E-mail"] === emailParam);

              if (registro) {
                dadosAnamnese = {
                  whatsapp:     registro["WhatsApp"]          || "",
                  objetivo:     registro["Objetivos"]         || "",
                  experiencia:  registro["Experiencia"]       || "",
                  local:        registro["Local"]             || "",
                  equipamentos: registro["Equipamentos"]      || "",
                  diasSemana:   registro["Dias_Semana"]       || "",
                  tempoTreino:  registro["Tempo_Treino"]      || "",
                  condicoes:    registro["Condicoes_Medicas"] || "",
                  dores:        registro["Dores_Lesoes"]      || "",
                  remedios:     registro["Remedios"]          || "",
                };
                showToast("Dados da anamnese carregados!");
              } else {
                showToast("Anamnese não encontrada — aluno criado sem dados.");
              }
            } catch(err) {
              showToast("Erro ao buscar anamnese. Aluno criado sem dados.");
            }

            // Cria o aluno no gerador com os dados buscados
            const id = Date.now().toString();
            const today = new Date().toISOString().split("T")[0];
            appData.students.unshift({
              id,
              name:            nomeParam              || "Novo Aluno",
              focus:           dadosAnamnese.objetivo || "Hipertrofia",
              startDate:       today,
              expiryDate:      "",
              checkUpDay:      "",
              checkUpTime:     "",
              planoAtual:      "individual",
              email:           emailParam,
              tipoConsultoria: "Online",
              statusTreino:    "Pendente",
              pillars:         JSON.parse(JSON.stringify(appData.pillars)),
              blocks:          [],
              anamnese:        dadosAnamnese,
            });

            saveLocal();
            renderStudentList();
            loadStudent(id);
          }

          // Limpa a URL para evitar problemas ao recarregar
          window.history.replaceState({}, document.title, window.location.pathname);

        } else {
          if (appData.students.length) loadStudent(appData.students[0].id);
          else createStudent();
        }
      }

      function renderStudentList(filter = "") {
        const l = document.getElementById("studentList");
        l.innerHTML = "";
        const term = filter.toLowerCase();

        appData.students
          .filter((s) => s.name.toLowerCase().includes(term))
          .forEach((s) => {
            let progress = 0;
            let daysLeft = 0;
            let statusColor = "var(--success)";

            if (s.startDate && s.expiryDate) {
              const [sy, sm, sd] = s.startDate.split("-");
              const [ey, em, ed] = s.expiryDate.split("-");
              const start = new Date(sy, sm - 1, sd);
              const end = new Date(ey, em - 1, ed);
              const now = new Date();
              now.setHours(0, 0, 0, 0);

              const total = end - start;
              const elapsed = now - start;
              daysLeft = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
              if (total > 0)
                progress = Math.min(100, Math.max(0, (elapsed / total) * 100));

              if (daysLeft < 3) statusColor = "var(--danger)";
              else if (daysLeft < 10) statusColor = "var(--warning)";
            }

            const activeClass =
              currentStudent && currentStudent.id === s.id ? "active" : "";
            const checkInfo =
              s.checkUpDay && s.checkUpTime
                ? `📅 ${s.checkUpDay} • ${s.checkUpTime}`
                : "";
            const daysDisplay = daysLeft < 0 ? "Expirado" : `${daysLeft}d`;

            l.innerHTML += `
            <div class="s-item ${activeClass}" onclick="loadStudent('${s.id}')">
                <div class="s-header">
                    <span class="s-name">${s.name}</span>
                    <span class="s-days" style="color:${statusColor}; background:color-mix(in srgb, ${statusColor} 10%, white);">${daysDisplay}</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${progress}%; background:${statusColor}"></div></div>
                <div class="s-footer">
                    <span>${s.focus}</span>
                    ${checkInfo ? `<span class="checkup-badge">${checkInfo}</span>` : ""}
                </div>
            </div>`;
          });
      }

      let targetBlockIdx = null;
      let targetStageId = null;

      async function loadStudent(id) {
        let newStudent = appData.students.find(
          (s) => String(s.id) === String(id),
        );
        if (!newStudent) return;

        // Se for um aluno placeholder (sincronizado do Master Gist mas sem os dados locais)
        if (newStudent.focus === "Carregando..." && newStudent.gistId) {
          const t = document.getElementById("gh-token").value;
          if (!t)
            return customAlert(
              "Configure o Token do GitHub para baixar os dados deste aluno.",
            );

          try {
            showToast("Baixando treino do aluno...");
            const res = await fetch(
              `https://api.github.com/gists/${newStudent.gistId}`,
              { headers: { Authorization: `token ${t}` } },
            );
            if (!res.ok) throw new Error("Falha ao baixar do GitHub");
            const j = await res.json();
            const studentData = JSON.parse(j.files["treino.json"].content);

            // Substitui o placeholder pelos dados reais
            const idx = appData.students.findIndex(
              (s) => String(s.id) === String(id),
            );
            appData.students[idx] = studentData;
            newStudent = studentData;
            saveLocal();
          } catch (e) {
            customAlert("Erro ao carregar aluno: " + e.message);
            return;
          }
        }

        // Data migration check for old students without pillars/logic structure
        if (!newStudent.logic || typeof newStudent.logic === "string")
          newStudent.logic = [];
        if (!newStudent.pillars)
          newStudent.pillars = JSON.parse(JSON.stringify(appData.pillars));

        // Migrate old blocks to new stages structure
        if (newStudent.blocks) {
          newStudent.blocks.forEach((blk) => {
            if (blk.items && !blk.stages) {
              blk.stages = {
                mobilidade: [],
                ativacao: [],
                forca: blk.items,
                desaceleracao: [],
              };
              delete blk.items;
            }
          });
        }

        triggerPreviewFade(() => {
          currentStudent = newStudent;
          renderStudentList(document.querySelector(".search-inp").value);

          document.getElementById("ed-name").value = currentStudent.name;
          resizeNameInput(document.getElementById("ed-name"));
          document.getElementById("ed-focus").value = currentStudent.focus;
          document.getElementById("ed-start").value = currentStudent.startDate;
          document.getElementById("ed-end").value = currentStudent.expiryDate;
          document.getElementById("ed-plano").value =
            currentStudent.planoAtual || "individual";

          // Novos campos de gestão
          document.getElementById("ed-email").value =
            currentStudent.email || "";
          document.getElementById("ed-tipo-consultoria").value =
            currentStudent.tipoConsultoria || "Online";
          document.getElementById("ed-status-treino").value =
            currentStudent.statusTreino || "Pendente";

          // Check-up Restore
          document.getElementById("ed-check-day").value =
            currentStudent.checkUpDay || "";
          document.getElementById("ed-check-time").value =
            currentStudent.checkUpTime || "";

          calcNextCheckup();
          switchRightTab("lib");
          renderEditor(); // Render Workout
          // IMPORTANT: Reset view to workout initially
          switchView("train");
        });
      }

      function updateStudent(field, val) {
        if (!currentStudent) return;
        currentStudent[field] = val;
        saveLocal();
        if (["name", "startDate", "expiryDate"].includes(field))
          renderStudentList(document.querySelector(".search-inp").value);
      }

      async function autoSaveGestao() {
        if (!currentStudent || !currentStudent.email) return;

        // Monta o link do webapp se já tiver sheetsId
        const linkTreino = currentStudent.sheetsId
          ? (window.location.origin + window.location.pathname.replace("gerador.html", "webapp.html") + "?id=" + currentStudent.sheetsId)
          : "";

        const data = {
          tipo:            "gestao",
          email:           currentStudent.email,
          nome:            currentStudent.name,
          tipoConsultoria: currentStudent.tipoConsultoria || "Online",
          dataInicio:      currentStudent.startDate       || "",
          dataFim:         currentStudent.expiryDate      || "",
          dataCheckup:     currentStudent.checkUpDay
                             ? `${currentStudent.checkUpDay} ${currentStudent.checkUpTime}`
                             : "",
          statusTreino:    currentStudent.statusTreino    || "Pendente",
          sheetsId:        currentStudent.sheetsId        || "",
          linkTreino:      linkTreino,
          planoAtual:      currentStudent.planoAtual      || "",
        };

        try {
          const res = await fetch(
            "https://script.google.com/macros/s/AKfycbxBLR5u1BVTJoD8HYwBF603lSfXKkJBXqf9voHfcUiywxgsAsJ8tLeClhNL-1gdeHRf/exec",
            {
              method:  "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body:    JSON.stringify(data),
            },
          );
          const result = await res.json();
          if (result.status === "erro") {
            console.error("Erro no auto-save da gestão:", result.mensagem);
          } else {
            console.log("Gestão salva para", currentStudent.email);
          }
        } catch (e) {
          console.error("Erro no auto-save da gestão:", e);
        }
      }

      function resizeNameInput(el) {
        el.style.width = (el.value.length + 1) * 1.1 + "ch";
      }

      // --- CHECKUP LOGIC ---
      function updateCheckup() {
        if (!currentStudent) return;
        currentStudent.checkUpDay =
          document.getElementById("ed-check-day").value;
        currentStudent.checkUpTime =
          document.getElementById("ed-check-time").value;
        calcNextCheckup();
        saveLocal();
        renderStudentList(document.querySelector(".search-inp").value);
        autoSaveGestao();
      }

      function calcNextCheckup() {
        const dayMap = {
          Seg: 1,
          Ter: 2,
          Qua: 3,
          Qui: 4,
          Sex: 5,
          Sáb: 6,
          Dom: 0,
        };
        const dayStr = document.getElementById("ed-check-day").value;
        const disp = document.getElementById("chk-next-date");

        if (!dayStr || dayMap[dayStr] === undefined) {
          disp.innerText = "--/--";
          return;
        }

        const targetDay = dayMap[dayStr];
        const d = new Date();
        const today = d.getDay();

        let diff = targetDay - today;
        if (diff <= 0) diff += 7; // Next occurrence

        d.setDate(d.getDate() + diff);

        const dateStr = d.toLocaleDateString("pt-BR", {
          day: "2-digit",
          month: "2-digit",
        });
        disp.innerText = dateStr;
      }

      // --- PHONE VIEWS (NEW) ---
      function switchView(view) {
        const trainCanvas = document.getElementById("editor-canvas");
        const methodCanvas = document.getElementById("method-canvas");
        const historyCanvas = document.getElementById("history-canvas");
        const feedbackCanvas = document.getElementById("feedback-canvas");
        const tabs = document.querySelectorAll(".app-tab");

        tabs.forEach((t) => t.classList.remove("active"));

        trainCanvas.style.display = "none";
        methodCanvas.style.display = "none";
        historyCanvas.style.display = "none";
        feedbackCanvas.style.display = "none";

        if (view === "train") {
          document.getElementById("tab-train").classList.add("active");
          trainCanvas.style.display = "block";
        } else if (view === "logic") {
          document.getElementById("tab-logic").classList.add("active");
          methodCanvas.style.display = "block";
          renderPhoneMethodology();
          switchRightTab("method");
        } else if (view === "history") {
          document.getElementById("tab-history").classList.add("active");
          historyCanvas.style.display = "block";
          loadHistory();
        } else if (view === "feedback") {
          document.getElementById("tab-feedback").classList.add("active");
          feedbackCanvas.style.display = "block";
          renderFeedbackView();
        }
      }

      async function renderFeedbackView() {
        const container = document.getElementById("feedback-canvas");
        container.innerHTML =
          '<div style="text-align:center; padding:20px;">Carregando depoimentos...</div>';

        try {
          const url =
            "https://script.google.com/macros/s/AKfycbxBLR5u1BVTJoD8HYwBF603lSfXKkJBXqf9voHfcUiywxgsAsJ8tLeClhNL-1gdeHRf/exec?tipo=feedback";
          const req = await fetch(url);
          const data = await req.json();

          if (data.error) throw new Error(data.error);

          let html =
            '<div style="display:flex; flex-direction:column; gap:15px;">';

          if (data.length === 0) {
            html +=
              '<div style="text-align:center; padding:20px; color:var(--text-muted);">Nenhum depoimento recebido ainda.</div>';
          } else {
            // Reverse to show newest first
            data.reverse().forEach((item) => {
              let fullDate = item["Data/Hora"] || "Data Desconhecida";
              try {
                if (
                  typeof fullDate === "string" &&
                  fullDate.includes("T") &&
                  fullDate.includes("Z")
                ) {
                  const d = new Date(fullDate);
                  if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, "0");
                    const mes = String(d.getMonth() + 1).padStart(2, "0");
                    const ano = d.getFullYear();
                    const hora = String(d.getHours()).padStart(2, "0");
                    const min = String(d.getMinutes()).padStart(2, "0");
                    fullDate = `${dia}/${mes}/${ano} às ${hora}:${min}`;
                  }
                } else if (
                  fullDate instanceof Date ||
                  (typeof fullDate === "string" &&
                    !isNaN(Date.parse(fullDate)) &&
                    !fullDate.includes("/"))
                ) {
                  const d = new Date(fullDate);
                  if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, "0");
                    const mes = String(d.getMonth() + 1).padStart(2, "0");
                    const ano = d.getFullYear();
                    const hora = String(d.getHours()).padStart(2, "0");
                    const min = String(d.getMinutes()).padStart(2, "0");
                    fullDate = `${dia}/${mes}/${ano} às ${hora}:${min}`;
                  }
                }
              } catch (e) {
                // Keep original if parsing fails
              }

              html += `
                    <div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <div style="font-weight:800; color:var(--primary);">${item["Nome do Aluno"]}</div>
                            <div style="font-size:0.75rem; color:var(--text-muted);">${fullDate}</div>
                        </div>
                        <div style="color:#f59e0b; margin-bottom:10px;">${item["Nota (Estrelas)"]}</div>
                        <div style="font-style:italic; margin-bottom:15px; line-height:1.4;">"${item["Depoimento"]}"</div>
                        ${
                          item["Link da Imagem (Google Drive)"] !== "Sem imagem"
                            ? `<a href="${item["Link da Imagem (Google Drive)"]}" target="_blank" style="display:block; background:var(--accent); color:white; text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:700; font-size:0.85rem;">
                                <i class="fa-solid fa-image"></i> VER IMAGEM DO DEPOIMENTO
                            </a>`
                            : ""
                        }
                    </div>`;
            });
          }
          html += "</div>";
          container.innerHTML = html;
        } catch (e) {
          container.innerHTML =
            '<div style="text-align:center; padding:20px; color:var(--danger);">Erro ao carregar depoimentos.</div>';
        }
      }

      function renderMethodFields(
        method,
        bIdx,
        stageId,
        iIdx,
        currentVal,
        locked,
      ) {
        let html = "";
        const disabled = locked ? "disabled" : "";
        const val = currentVal || "";

        if (method === "Isometria") {
          html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Tempo Isometria (seg)" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === "Drop-set") {
          html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Qtd Drops / Detalhes" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === "Rest-Pause") {
          html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Pausa (seg) / Falhas" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        } else if (method === "Pirâmide") {
          html = `<div class="extra-field-Row"><input class="extra-inp" placeholder="Cargas (Ex: 10/12/14kg)" value="${val}" onchange="updItem(${bIdx},'${stageId}',${iIdx},'extra',this.value)" ${disabled}></div>`;
        }
        return html;
      }

      function toggleItemCollapse(bIdx, stageId, iIdx) {
        haptic("light");
        const item = currentStudent.blocks[bIdx].stages[stageId][iIdx];
        item.collapsed = !item.collapsed;
        saveLocal();
        renderEditor();
      }

      function toggleBlockCollapse(bIdx) {
        haptic("light");
        currentStudent.blocks[bIdx].collapsed =
          !currentStudent.blocks[bIdx].collapsed;
        saveLocal();
        renderEditor();
      }

      function addBlock() {
        haptic("medium");
        currentStudent.blocks.push({
          name:
            "Bloco " + String.fromCharCode(65 + currentStudent.blocks.length),
          desc: "",
          locked: false,
          collapsed: false,
          stages: {
            mobilidade: [],
            ativacao: [],
            forca: [],
            desaceleracao: [],
          },
        });
        saveLocal();
        renderEditor();
      }
      function toggleLock(bIdx) {
        haptic("light");
        currentStudent.blocks[bIdx].locked =
          !currentStudent.blocks[bIdx].locked;
        saveLocal();
        renderEditor();
      }
      async function delBlock(bIdx) {
        haptic("heavy");
        if (await customConfirm("Excluir bloco?")) {
          currentStudent.blocks.splice(bIdx, 1);
          saveLocal();
          renderEditor();
        }
      }
      function duplicateBlock(bIdx) {
        haptic("medium");
        const blockToCopy = JSON.parse(
          JSON.stringify(currentStudent.blocks[bIdx]),
        );
        blockToCopy.name += " (Cópia)";
        currentStudent.blocks.splice(bIdx + 1, 0, blockToCopy);
        saveLocal();
        renderEditor();
        showToast("Bloco duplicado!");
      }

      function copyBlockToClipboard(bIdx) {
        haptic("light");
        const blockToCopy = JSON.parse(
          JSON.stringify(currentStudent.blocks[bIdx]),
        );
        localStorage.setItem("copied_block", JSON.stringify(blockToCopy));
        showToast("Bloco copiado! Vá para outro aluno e clique em Colar.");
      }

      function pasteBlockFromClipboard() {
        haptic("medium");
        const copiedData = localStorage.getItem("copied_block");
        if (!copiedData) {
          customAlert("Nenhum bloco copiado. Copie um bloco primeiro.");
          return;
        }
        const blockToPaste = JSON.parse(copiedData);
        // Rename slightly to indicate it's pasted
        blockToPaste.name += " (Colado)";
        currentStudent.blocks.push(blockToPaste);
        saveLocal();
        renderEditor();
        showToast("Bloco colado com sucesso!");
      }

      function updBlock(bIdx, field, val) {
        currentStudent.blocks[bIdx][field] = val;
        saveLocal();
      }
      function updItem(bIdx, stageId, iIdx, field, val) {
        currentStudent.blocks[bIdx].stages[stageId][iIdx][field] = val;
        saveLocal();
      }

      function handleExerciseNameChange(bIdx, stageId, iIdx, newName) {
        if (!currentStudent || !currentStudent.blocks[bIdx]) return;
        const item = currentStudent.blocks[bIdx].stages[stageId][iIdx];

        const libEx = appData.library.find(
          (ex) => ex.name.toLowerCase() === newName.toLowerCase(),
        );
        if (libEx) {
          item.name = libEx.name;
          if (!item.method || item.method === "Normal") {
            item.method = libEx.method || "Normal";
          }
          item.link = libEx.video || "";
          showToast("Preenchido da biblioteca!");
        } else {
          item.name = newName;
        }
        saveLocal();
        renderEditor();

      async function delItem(bIdx, stageId, iIdx) {
        haptic("heavy");
        if (await customConfirm("Remover exercício?")) {
          currentStudent.blocks[bIdx].stages[stageId].splice(iIdx, 1);
          saveLocal();
          renderEditor();
        }
      }
      function moveBlock(oldIdx, newIdx) {
        haptic("light");
        const item = currentStudent.blocks.splice(oldIdx, 1)[0];
        currentStudent.blocks.splice(newIdx, 0, item);
        saveLocal();
        renderEditor();
      }
      function moveItem(fromId, toId, oldIdx, newIdx) {
        haptic("light");
        const fromMatch = fromId.match(/blk-(\d+)-stage-(.+)/);
        const toMatch = toId.match(/blk-(\d+)-stage-(.+)/);
        if (!fromMatch || !toMatch) return;
        const fromBIdx = parseInt(fromMatch[1]);
        const fromStage = fromMatch[2];
        const toBIdx = parseInt(toMatch[1]);
        const toStage = toMatch[2];
        const item = currentStudent.blocks[fromBIdx].stages[fromStage].splice(
          oldIdx,
          1,
        )[0];
        currentStudent.blocks[toBIdx].stages[toStage].splice(newIdx, 0, item);
        saveLocal();
        renderEditor();
      }

      // --- ADD METHOD ---
      function addMethod(type) {
        haptic("medium");
        if (currentStudent.blocks.length === 0) {
          addBlock();
          setTimeout(() => addMethod(type), 50);
          return;
        }
        const lastBlock =
          currentStudent.blocks[currentStudent.blocks.length - 1];
        if (lastBlock.locked)
          return customAlert("O último bloco está bloqueado.");
        if (lastBlock.collapsed) {
          lastBlock.collapsed = false;
        }

        const targetStage = document.getElementById(
          "target-stage-select",
        ).value;

        const createItem = (m, name = "Novo Exercício") => ({
          name: name,
          sets: m === "GVT" ? "10" : m === "FST-7" ? "7" : "3",
          reps: m === "GVT" ? "10" : m === "FST-7" ? "8-12" : "10",
          rest: m === "FST-7" ? "30s" : "60s",
          restEx: "",
          method: m,
          extra: "",
          note: "",
          collapsed: false,
        });

        if (type === "Bi-set") {
          lastBlock.stages[targetStage].push(
            createItem("Bi-set", "Exercício A"),
          );
          lastBlock.stages[targetStage].push(
            createItem("Bi-set", "Exercício B"),
          );
        } else if (type === "Tri-set") {
          lastBlock.stages[targetStage].push(
            createItem("Tri-set", "Exercício A"),
          );
          lastBlock.stages[targetStage].push(
            createItem("Tri-set", "Exercício B"),
          );
          lastBlock.stages[targetStage].push(
            createItem("Tri-set", "Exercício C"),
          );
        } else {
          lastBlock.stages[targetStage].push(createItem(type));
        }
        saveLocal();
        renderEditor();
        const cv = document.getElementById("editor-canvas");
        setTimeout(() => (cv.scrollTop = cv.scrollHeight), 100);
      }

      // --- CLOUD & UTILS (MASTER GIST ARCHITECTURE) ---

      // 1. CREATE MASTER GIST
      async function createMasterGist() {
        const t = document.getElementById("gh-token").value;
        if (!t) return customAlert("Configure o Token primeiro.");

        if (
          !(await customConfirm(
            "Isso criará um novo Banco de Dados na sua conta do GitHub. Deseja continuar?",
          ))
        )
          return;

        const masterData = {
          library: appData.library,
          groups: appData.groups,
          equips: appData.equips,
          methods: appData.methods,
          pillars: appData.pillars,
          studentIndex: appData.students.map((s) => ({
            id: s.id,
            name: s.name,
            gistId: s.gistId || null,
          })),
        };

        try {
          const payload = {
            description: `Benai Manager Database`,
            public: false,
            files: {
              "benai_master.json": { content: JSON.stringify(masterData) },
            },
          };

          const res = await fetch("https://api.github.com/gists", {
            method: "POST",
            headers: { Authorization: `token ${t}` },
            body: JSON.stringify(payload),
          });

          if (!res.ok) throw new Error("Erro ao criar Master Gist");
          const j = await res.json();

          appData.masterGistId = j.id;
          document.getElementById("master-gist-id").value = j.id;
          localStorage.setItem(MASTER_GIST_KEY, j.id);
          saveLocal();

          showToast("Banco de Dados Criado!");
        } catch (e) {
          customAlert("Erro: " + e.message);
        }
      }

      // 2. SYNC MASTER GIST (PULL)
      async function syncMasterGist(silent = false) {
        const t = document.getElementById("gh-token").value;
        const mId = document.getElementById("master-gist-id").value;

        if (!t || !mId) {
          if (!silent)
            customAlert("Token e ID do Gist Master são necessários.");
          return;
        }

        try {
          if (!silent) showToast("Sincronizando...");
          const res = await fetch(`https://api.github.com/gists/${mId}`, {
            headers: { Authorization: `token ${t}` },
          });
          if (!res.ok) throw new Error("Gist Master não encontrado");

          const j = await res.json();
          const masterData = JSON.parse(j.files["benai_master.json"].content);

          // Update local data with Master data
          appData.library = masterData.library || [];
          appData.groups = masterData.groups || appData.groups;
          appData.equips = masterData.equips || appData.equips;
          appData.methods = masterData.methods || appData.methods;
          appData.pillars = masterData.pillars || appData.pillars;

          // Update Student Index (keep local data if it exists, otherwise add from index)
          if (masterData.studentIndex) {
            const localIds = appData.students.map((s) => s.id);
            masterData.studentIndex.forEach((idxStudent) => {
              if (!localIds.includes(idxStudent.id)) {
                // Add placeholder student to list
                appData.students.push({
                  id: idxStudent.id,
                  name: idxStudent.name,
                  gistId: idxStudent.gistId,
                  focus: "Carregando...",
                  blocks: [],
                });
              }
            });
          }

          appData.masterGistId = mId;
          localStorage.setItem(MASTER_GIST_KEY, mId);
          saveLocal();

          renderLibrary();
          updateDatalist();
          renderStudentList();

          if (!silent) {
            showToast("Sincronização Concluída!");
            closeModal("modal-cloud");
          }

          // Return true to indicate success
          return true;
        } catch (e) {
          if (!silent) customAlert("Erro ao sincronizar: " + e.message);
          return false;
        }
      }

      // 3. UPDATE MASTER GIST (PUSH)
      async function updateMasterGist() {
        const t = document.getElementById("gh-token").value;
        const mId = appData.masterGistId;
        if (!t || !mId) return; // Silent fail if not configured

        const masterData = {
          library: appData.library,
          groups: appData.groups,
          equips: appData.equips,
          methods: appData.methods,
          pillars: appData.pillars,
          studentIndex: appData.students.map((s) => ({
            id: s.id,
            name: s.name,
            gistId: s.gistId || null,
          })),
        };

        try {
          const payload = {
