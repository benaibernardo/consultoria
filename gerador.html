      // 4. SAVE STUDENT TO CLOUD (UPDATED)
      async function saveToSheets() {
        if (!currentStudent) return;

        showToast("Salvando treino na nuvem...");

        if (!currentStudent.sheetsId) {
          currentStudent.sheetsId = "treino_" + Date.now();
          saveLocal();
        }

        const data = {
          tipo:            "treino",
          sheetsId:        currentStudent.sheetsId,
          email:           currentStudent.email           || "",
          nome:            currentStudent.name            || "",
          tipoConsultoria: currentStudent.tipoConsultoria || "Online",
          statusTreino:    currentStudent.statusTreino    || "Pendente",
          dataInicio:      currentStudent.startDate       || "",
          dataFim:         currentStudent.expiryDate      || "",
          treino:          JSON.stringify(currentStudent),
        };

        try {
          const response = await fetch(
            "https://script.google.com/macros/s/AKfycbxBLR5u1BVTJoD8HYwBF603lSfXKkJBXqf9voHfcUiywxgsAsJ8tLeClhNL-1gdeHRf/exec",
            {
              method:  "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body:    JSON.stringify(data),
            }
          );

          const result = await response.json();
          if (result.status === "erro") {
            throw new Error(result.mensagem);
          }

          // Sincroniza dados de gestão (sheetsId + link) de volta ao Gestao_alunos
          await autoSaveGestao();

          showToast("Treino salvo com sucesso!");

          const id = currentStudent.sheetsId;
          const longUrl = window.location.origin +
            window.location.pathname.replace("gerador.html", "webapp.html") +
            "?id=" + id;

          const msgLink = "Treino salvo!\n\nLink do aluno:\n" + longUrl + "\n\nCopie o link acima e cole no TinyURL para personalizar.\n\nAbrir TinyURL agora?";
          if (await customConfirm(msgLink))
            window.open("https://tinyurl.com/app", "_blank");

        } catch (e) {
          customAlert("Erro ao salvar o treino:\n\n" + e.message);
        }
      }

      async function saveToCloud(method) {
        // Aluno sem gistId = novo sistema, salva no Sheets
        if (!currentStudent.gistId) {
          return saveToSheets();
        }

        const t = document.getElementById("gh-token").value.trim();
        if (!t) return customAlert("Configure o Token primeiro.");

        if (method === "POST" || !currentStudent.gistId) {
          if (!(await customConfirm("Criar novo link para este aluno?")))
            return;
          method = "POST";
        }

        try {
          showToast("Salvando Aluno...");

          // Fix potentially corrupted gistId
          if (currentStudent.gistId) {
            let cleanId = currentStudent.gistId.trim();
            if (cleanId.includes("?id="))
              cleanId = cleanId.split("?id=")[1].split("&")[0];
            else if (cleanId.includes("/")) cleanId = cleanId.split("/").pop();

            if (!/^[a-f0-9]{32}$/i.test(cleanId)) {
              customAlert(
                "O ID salvo neste aluno é inválido (" +
                  cleanId +
                  ").\n\nIsso acontece se você preencheu o ID com um link do TinyURL ou um nome em vez do código de 32 caracteres.\n\nPara corrigir: Exclua este aluno, clique em 'Importar ID' e cole o ID longo correto (que você pega abrindo o TinyURL no navegador).",
              );
              return;
            }
            currentStudent.gistId = cleanId;
          }

          // Clean up student object before saving (don't save full library in student gist anymore)
          const studentToSave = JSON.parse(JSON.stringify(currentStudent));

          const payload = {
            description: `Treino: ${currentStudent.name}`,
            public: false,
            files: {
              "treino.json": { content: JSON.stringify(studentToSave) },
            },
          };
          let url = "https://api.github.com/gists";
          if (method === "PATCH") url += "/" + currentStudent.gistId;

          const res = await fetch(url, {
            method,
            headers: { Authorization: `token ${t}` },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.message || `Erro HTTP: ${res.status}`);
          }

          const j = await res.json();
          if (method === "POST") {
            currentStudent.gistId = j.id;
            saveLocal();
          }

          // Update Master Gist to reflect new student/gistId
          updateMasterGist();

          if (method === "POST") {
            copyTinyUrlFlow(j.id);
          } else {
            showToast("Treino atualizado com sucesso!");
          }
        } catch (e) {
          customAlert("Erro: " + e.message);
        }
      }

      async function copyTinyUrlFlow(gistId) {
        const id = gistId || currentStudent.gistId;
        if (!id) return customAlert("Salve na nuvem primeiro.");
        const longUrl = `${window.location.origin}${window.location.pathname.replace("gerador.html", "webapp.html")}?id=${id}`;
        await navigator.clipboard.writeText(longUrl);
        if (await customConfirm("Link original copiado!\n\nAbrir TinyURL?"))
          window.open("https://tinyurl.com/app", "_blank");
      }

      // 5. IMPORT ID & EXTRACT EXERCISES
      function promptImportID() {
        let rawId = prompt(
          "Insira o Gist ID do aluno (ou o link completo do WebApp):",
        );
        if (!rawId) return;

        let id = rawId.trim();
        if (id.includes("?id=")) {
          id = id.split("?id=")[1].split("&")[0];
        } else if (id.includes("/")) {
          id = id.split("/").pop();
        }

        // Validate Gist ID format (usually 32 hex characters)
        if (!/^[a-f0-9]{32}$/i.test(id)) {
          customAlert(
            "ID inválido!\n\nVocê inseriu: " +
              id +
              "\n\nO Gist ID correto é um código de 32 letras e números.\nSe você tem um link do TinyURL (ex: tinyurl.com/Erondi), abra ele no navegador, espere carregar o WebApp, e copie o ID longo que aparece lá em cima na barra de endereços (?id=...).",
          );
          return;
        }

        const token = document.getElementById("gh-token").value.trim();
        if (!token) return customAlert("Configure o Token primeiro.");

        showToast("Importando e extraindo...");
        fetch(`https://api.github.com/gists/${id}`, {
          headers: { Authorization: `token ${token}` },
        })
          .then(async (r) => {
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              throw new Error(err.message || `Erro HTTP: ${r.status}`);
            }
            return r.json();
          })
          .then((j) => {
            const s = JSON.parse(j.files["treino.json"].content);
            s.gistId = id;

            // Check if student already exists locally
            const existingIdx = appData.students.findIndex(
              (st) => st.id === s.id || st.gistId === id,
            );
            if (existingIdx >= 0) {
              appData.students[existingIdx] = s;
            } else {
              appData.students.unshift(s);
            }

            // --- EXERCISE EXTRACTION LOGIC ---
            let extractedCount = 0;
            if (s.blocks) {
              s.blocks.forEach((blk) => {
                if (blk.stages) {
                  Object.values(blk.stages).forEach((stageArray) => {
                    stageArray.forEach((ex) => {
                      // Check if exercise already exists in library by name
                      const exists = appData.library.some(
                        (libEx) =>
                          libEx.name.toLowerCase() === ex.name.toLowerCase(),
                      );
                      if (!exists) {
                        appData.library.push({
                          name: ex.name,
                          group: "Geral", // Default group
                          equip: "Livre", // Default equip
                          method: ex.method || "Musculação",
                          video: ex.link || "",
                        });
                        extractedCount++;
                      }
                    });
                  });
                }
              });
            }

            saveLocal();
            renderStudentList();
            renderLibrary();
            loadStudent(s.id);

            // Update Master Gist with new student and extracted exercises
            updateMasterGist();

            showToast(
              `Aluno Importado! ${extractedCount} exercícios adicionados à biblioteca.`,
            );
            closeModal("modal-cloud");
          })
          .catch((e) => customAlert("Erro ao importar: " + e.message));
      }

      // --- DELETE STUDENT ---
      async function deleteCurrentStudent() {
        if (!currentStudent) return;
        if (
          await customConfirm(
            `Tem certeza que deseja excluir o aluno "${currentStudent.name}"?\nEsta ação não pode ser desfeita.`,
          )
        ) {
          // Set status to Inativo in CRM before deleting locally
          if (currentStudent.email) {
            currentStudent.statusTreino = "Inativo";
            await autoSaveGestao();
          }

          appData.students = appData.students.filter(
            (s) => s.id !== currentStudent.id,
          );
          saveLocal();
          currentStudent = null;
          renderStudentList();

          // Update Master Gist to remove student from index
          updateMasterGist();

          if (appData.students.length > 0) {
            loadStudent(appData.students[0].id);
          } else {
            createStudent();
          }
          showToast("Aluno Excluído!");
        }
      }

      function customConfirm(msg) {
        return new Promise((resolve) => {
          document.getElementById("custom-confirm-msg").innerText = msg;
          document.getElementById("custom-confirm-modal").style.display =
            "flex";

          const btnYes = document.getElementById("custom-confirm-yes");
          const btnNo = document.getElementById("custom-confirm-no");

          const newBtnYes = btnYes.cloneNode(true);
          const newBtnNo = btnNo.cloneNode(true);
          btnYes.parentNode.replaceChild(newBtnYes, btnYes);
          btnNo.parentNode.replaceChild(newBtnNo, btnNo);

          newBtnYes.addEventListener("click", () => {

              "none";

      function renderHistoryUI() {
        const container = document.getElementById("history-canvas");
        if (cachedHistoryData.length === 0) {
          container.innerHTML =
            '<div style="text-align:center; padding:40px; color:var(--text-muted);"><i class="fa-solid fa-folder-open" style="font-size:3rem; margin-bottom:15px; opacity:0.5;"></i><br>Nenhum histórico encontrado para este aluno.</div>';
          return;
        }

        const grouped = {};
        cachedHistoryData.forEach((row) => {
          let fullDate = row["Data/Hora"] || "Data Desconhecida";
          let dateOnly = fullDate;
          let timeOnly = "";

          try {
            if (
              typeof fullDate === "string" &&
              fullDate.includes("T") &&
              fullDate.includes("Z")
            ) {
              const d = new Date(fullDate);
              if (!isNaN(d.getTime())) {
                const dia = String(d.getDate()).padStart(2, "0");
                const mes = String(d.getMonth() + 1).padStart(2, "0");
                const ano = d.getFullYear();
                const hora = String(d.getHours()).padStart(2, "0");
                const min = String(d.getMinutes()).padStart(2, "0");
                dateOnly = `${dia}/${mes}/${ano}`;
                timeOnly = `${hora}:${min}`;
              }
            } else if (
              fullDate instanceof Date ||
              (typeof fullDate === "string" &&
                !isNaN(Date.parse(fullDate)) &&
                !fullDate.includes("/"))
            ) {
              const d = new Date(fullDate);
              if (!isNaN(d.getTime())) {
                const dia = String(d.getDate()).padStart(2, "0");
                const mes = String(d.getMonth() + 1).padStart(2, "0");
                const ano = d.getFullYear();
                const hora = String(d.getHours()).padStart(2, "0");
                const min = String(d.getMinutes()).padStart(2, "0");
                dateOnly = `${dia}/${mes}/${ano}`;
                timeOnly = `${hora}:${min}`;
              }
            } else if (typeof fullDate === "string" && fullDate.includes(" às ")) {
              const parts = fullDate.split(" às ");
              dateOnly = parts[0];
              timeOnly = parts[1];
            } else if (typeof fullDate === "string" && fullDate.includes(" ")) {
              const parts = fullDate.split(" ");
              dateOnly = parts[0];
              timeOnly = parts[1];
            }
          } catch (e) {
            // Keep original if parsing fails
          }

          row._timeOnly = timeOnly;

          if (!grouped[dateOnly]) grouped[dateOnly] = [];
          grouped[dateOnly].push(row);
        });

        const sortedDates = Object.keys(grouped).sort((a, b) => {
          if (a === "Data Desconhecida") return 1;
          if (b === "Data Desconhecida") return -1;
          try {
            const [d1, m1, y1] = a.split("/");
            const [d2, m2, y2] = b.split("/");
            return new Date(y2, m2 - 1, d2) - new Date(y1, m1 - 1, d1);

      function buildCalendarHTML(historyData) {
        const today = new Date();
        const month = currentCalMonth;
        const year = currentCalYear;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const monthNames = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];

        const trainedDays = new Set();
        historyData.forEach((row) => {
          let dStr = row["Data/Hora"];
          if (dStr) {
            try {
              if (
                typeof dStr === "string" &&
                dStr.includes("T") &&
                dStr.includes("Z")
              ) {
                const d = new Date(dStr);
                if (!isNaN(d.getTime())) {
                  if (d.getMonth() === month && d.getFullYear() === year) {
                    trainedDays.add(d.getDate());
                  }
                }
              } else if (
                dStr instanceof Date ||
                (typeof dStr === "string" &&
                  !isNaN(Date.parse(dStr)) &&
                  !dStr.includes("/"))
              ) {
                const d = new Date(dStr);
                if (!isNaN(d.getTime())) {
                  if (d.getMonth() === month && d.getFullYear() === year) {
                    trainedDays.add(d.getDate());
                  }
                }
              } else {
                // Fallback for non-standard formats like DD/MM/YYYY
                const parts = dStr.split(" ")[0].split("/");
                if (parts.length === 3) {
                  if (
                    parseInt(parts[1]) - 1 === month &&
                    parseInt(parts[2]) === year
                  ) {
                    trainedDays.add(parseInt(parts[0]));
                  }
                }
              }
            } catch (e) {
              // Ignore parsing errors
            }
          }
        });

        let html = `<div class="calendar-container">
            <div class="cal-header">
                <button class="cal-nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span>${monthNames[month]} ${year}</span>
                <button class="cal-nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid">
                <div class="cal-day-name">Dom</div><div class="cal-day-name">Seg</div><div class="cal-day-name">Ter</div>
                <div class="cal-day-name">Qua</div><div class="cal-day-name">Qui</div><div class="cal-day-name">Sex</div><div class="cal-day-name">Sáb</div>`;

        for (let i = 0; i < firstDay; i++) {
          html += `<div class="cal-day empty"></div>`;
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const isTrained = trainedDays.has(i);
          const isToday =
            i === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear();
          let classes = "cal-day";
          if (isTrained) classes += " trained";
          if (isToday) classes += " today";

          const dayStr = String(i).padStart(2, "0");
          const monthStr = String(month + 1).padStart(2, "0");
          const dateId = `${dayStr}/${monthStr}/${year}`;

          html += `<div class="${classes}" onclick="scrollToDate('${dateId}')">${i}</div>`;
        }

        html += `</div></div>`;
        return html;
      }

      window.changeMonth = function (dir) {
        currentCalMonth += dir;
        if (currentCalMonth < 0) {
          currentCalMonth = 11;
          currentCalYear--;
        } else if (currentCalMonth > 11) {
          currentCalMonth = 0;
          currentCalYear++;
        }
        renderHistoryUI();
      };

      window.scrollToDate = function (dateStr) {
        // Esconde todos os cards; mostra apenas o do dia clicado
        document.querySelectorAll(".history-card").forEach((c) => {
          c.style.display = "none";
        });

        const el = document.getElementById("hist-card-" + dateStr);
        if (el) {
          el.style.display = "block";
          el.scrollIntoView({ behavior: "smooth", block: "start" });
          el.style.transition = "box-shadow 0.3s";
          el.style.boxShadow = "0 0 0 3px var(--accent)";
          setTimeout(() => (el.style.boxShadow = "none"), 1500);
          // Abre o acordeao automaticamente
          const body = el.querySelector(".hc-body");
          const icon = el.querySelector(".fa-chevron-down");
          if (body && body.classList.contains("collapsed")) {
            body.classList.remove("collapsed");
            if (icon) icon.style.transform = "rotate(0deg)";
          }
        } else {
          const feed = document.querySelector(".history-feed");
          if (feed) {
            const aviso = document.createElement("div");
            aviso.style.cssText =
              "text-align:center;padding:20px;color:var(--text-muted);font-size:0.85rem;";
            aviso.textContent = "Nenhum treino registrado neste dia.";
            feed.appendChild(aviso);
            setTimeout(() => aviso.remove(), 2000);
          }
        }
      };

      function toggleTheme() {
        const isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        document.documentElement.setAttribute(
          "data-theme",
          isDark ? "light" : "dark",
        );
      }
    </script>
  </body>
</html>
